<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bajaj Auto | Employee Feedback</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{font-family:'Inter',sans-serif;}
body{background:#f1f5f9;margin:0;}
.logo-tile{background:#fff;border-radius:12px;padding:6px 12px;display:inline-flex;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.logo-tile img{height:40px;width:auto;object-fit:contain;}
.fld{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px;font-size:14px;outline:none;transition:.15s;background:#fff;}
.fld:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.15);}
.fld[readonly]{background:#f1f5f9;color:#475569;}
label{font-weight:600;color:#334155;font-size:13px;display:block;margin-bottom:6px;}
.req::after{content:" *";color:#e11d48;}
.star{font-size:30px;cursor:pointer;color:#cbd5e1;transition:.15s;}
.star.active{color:#f59e0b;}
#backBtn{position:fixed;bottom:22px;right:22px;z-index:9999;background:#1e293b;color:#fff;border:none;padding:10px 18px;border-radius:12px;font-weight:700;font-size:14px;box-shadow:0 6px 16px rgba(0,0,0,.3);cursor:pointer;}
#backBtn:hover{background:#0f172a;}
@media(max-width:600px){#backBtn{bottom:16px;right:16px;padding:8px 14px;font-size:13px;}}
</style>
<script>
(function(){
  async function verifySession(){
    try{const res=await fetch("/check-session",{cache:"no-store"});if(!res.ok){window.location.href="employeelogin.html";}}catch(e){window.location.href="employeelogin.html";}
  }
  verifySession();
  window.addEventListener("pageshow",function(e){if(e.persisted){verifySession();}});
})();
</script>
<link rel="stylesheet" href="mobile.css">
</head>
<body>

<button id="backBtn" onclick="window.location.href='employee-dashboard.html'">&larr; Back</button>

<header class="bg-white shadow sticky top-0 z-40">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
    <div class="logo-tile"><img src="logo.png" alt="Bajaj Auto"></div>
    <div>
      <h1 class="font-extrabold text-blue-900 text-lg sm:text-xl">Employee Feedback Form</h1>
      <p class="text-xs text-gray-500">Bajaj Auto Transport Management</p>
    </div>
  </div>
</header>

<main class="max-w-3xl mx-auto px-4 py-8">
  <div class="bg-white rounded-3xl shadow-lg p-6 sm:p-8">
    <div class="flex items-center gap-3 mb-6">
      <div class="text-4xl">🗣️</div>
      <div>
        <h2 class="text-xl font-bold text-slate-800">We value your feedback</h2>
        <p class="text-sm text-gray-500">Tell us how we can improve the transport service.</p>
      </div>
    </div>

    <form id="fbForm" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
      <div><label>Employee Code</label><input class="fld" id="employeeCode" readonly></div>
      <div><label>Employee Name</label><input class="fld" id="employeeName" readonly></div>
      <div><label>Department</label><input class="fld" id="department" readonly></div>
      <div><label class="req">Category</label>
        <select class="fld" id="category" required>
          <option value="">-- Select --</option>
          <option>Bus Service</option>
          <option>Driver Behaviour</option>
          <option>Route / Timing</option>
          <option>Cleanliness</option>
          <option>Safety</option>
          <option>Suggestion</option>
          <option>Other</option>
        </select></div>
      <div class="sm:col-span-2"><label>Rating</label>
        <div id="stars" class="flex gap-1">
          <span class="star" data-v="1">★</span>
          <span class="star" data-v="2">★</span>
          <span class="star" data-v="3">★</span>
          <span class="star" data-v="4">★</span>
          <span class="star" data-v="5">★</span>
        </div></div>
      <div class="sm:col-span-2"><label class="req">Your Feedback</label><textarea class="fld" id="feedback" rows="4" required placeholder="Write your feedback, suggestion or concern..."></textarea></div>
      <div class="sm:col-span-2"><button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3.5 rounded-2xl font-bold transition">Submit Feedback</button></div>
    </form>

    <div id="msg" class="hidden mt-5 rounded-2xl p-4 text-center font-semibold"></div>
  </div>
</main>

<script>
document.getElementById("employeeCode").value = localStorage.getItem("employeeCode") || "";
document.getElementById("employeeName").value = localStorage.getItem("employeeName") || "";
document.getElementById("department").value  = localStorage.getItem("department") || "";

let rating=0;
document.querySelectorAll("#stars .star").forEach(s=>{
  s.addEventListener("click",()=>{
    rating=parseInt(s.dataset.v);
    document.querySelectorAll("#stars .star").forEach(x=>{ x.classList.toggle("active", parseInt(x.dataset.v)<=rating); });
  });
});

function showMsg(text, ok){
  const m=document.getElementById("msg");
  m.textContent=text;
  m.className="mt-5 rounded-2xl p-4 text-center font-semibold "+(ok?"bg-green-100 text-green-700":"bg-red-100 text-red-700");
  m.classList.remove("hidden");
}

document.getElementById("fbForm").addEventListener("submit", async function(e){
  e.preventDefault();
  const category=document.getElementById("category").value;
  const feedback=document.getElementById("feedback").value.trim();
  if(!category || !feedback){ showMsg("Please select a category and write your feedback.", false); return; }
  const payload={
    employeeName:document.getElementById("employeeName").value,
    department:document.getElementById("department").value,
    category:category,
    rating:rating,
    feedback:feedback
  };
  try{
    const res=await fetch("/submit-feedback",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    const data=await res.json();
    if(data.status==="success"){
      showMsg("✅ "+data.message, true);
      document.getElementById("fbForm").reset();
      rating=0; document.querySelectorAll("#stars .star").forEach(x=>x.classList.remove("active"));
      document.getElementById("employeeCode").value = localStorage.getItem("employeeCode") || "";
      document.getElementById("employeeName").value = localStorage.getItem("employeeName") || "";
      document.getElementById("department").value  = localStorage.getItem("department") || "";
    } else { showMsg("⚠️ "+(data.message||"Could not submit"), false); }
  }catch(err){ showMsg("Server error. Please try again.", false); }
});
</script>
</body>
</html>
