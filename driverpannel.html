<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver GPS Panel</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background:
    linear-gradient(rgba(6,15,35,.9),rgba(6,15,35,.92)),
    url('bajaj.jpg');
  background-size:cover; background-position:center;
}
.pulse{ animation:pulse 1.4s infinite; }
@keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)} 70%{box-shadow:0 0 0 16px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
</style>
<link rel="stylesheet" href="mobile.css">
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white/10 border border-white/20 backdrop-blur-md rounded-3xl p-6 sm:p-8 shadow-2xl text-center">

  <div class="logo-pill mx-auto">
    <img src="download (1).png" alt="Bajaj Auto" class="brand-logo">
  </div>

  <h1 class="text-2xl sm:text-3xl font-extrabold text-white mt-5">Driver GPS Panel</h1>
  <p class="text-slate-300 text-sm mt-2">Share your live location with the transport team</p>

  <!-- Status -->
  <div class="mt-7 bg-white/10 border border-white/20 rounded-2xl p-5">
    <div id="dot" class="mx-auto h-16 w-16 rounded-full bg-slate-400 flex items-center justify-center text-3xl">📍</div>
    <p id="statusText" class="text-white font-bold mt-3">GPS Off</p>
    <p id="coords" class="text-slate-300 text-xs mt-1 break-all">Location not shared yet</p>
  </div>

  <label class="block text-left text-white text-sm font-semibold mt-6 mb-2">Route</label>
  <select id="routeSelect" class="w-full p-3.5 rounded-2xl bg-white/10 border border-white/20 text-white">
    <option class="text-black" value="ROUTE1">ROUTE 1</option>
    <option class="text-black" value="ROUTE2">ROUTE 2</option>
    <option class="text-black" value="ROUTE3">ROUTE 3</option>
    <option class="text-black" value="ROUTE4">ROUTE 4</option>
    <option class="text-black" value="ROUTE5">ROUTE 5</option>
  </select>

  <button id="startBtn" onclick="start()"
    class="w-full mt-5 bg-green-600 hover:bg-green-700 text-white p-4 rounded-2xl font-bold text-lg transition">
    ▶ Start GPS
  </button>
  <button id="stopBtn" onclick="stop()"
    class="w-full mt-3 bg-red-600 hover:bg-red-700 text-white p-4 rounded-2xl font-bold text-lg transition hidden">
    ■ Stop GPS
  </button>

  <a href="index.html" class="inline-block mt-6 text-slate-300 text-sm hover:text-white transition">← Back Home</a>
</div>

<script>
let watchId = null;

function start(){
    const route = document.getElementById("routeSelect").value;

    if(!navigator.geolocation){
        alert("GPS is not supported on this device/browser.");
        return;
    }

    document.getElementById("dot").classList.remove("bg-slate-400");
    document.getElementById("dot").classList.add("bg-green-500","pulse");
    document.getElementById("statusText").innerText = "GPS Active — Sharing Location";
    document.getElementById("startBtn").classList.add("hidden");
    document.getElementById("stopBtn").classList.remove("hidden");

    watchId = navigator.geolocation.watchPosition(async pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        document.getElementById("coords").innerText = lat.toFixed(5) + ", " + lng.toFixed(5);
        try{
            await fetch("/update-location", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ route: route, lat: lat, lng: lng })
            });
        }catch(e){ /* server offline */ }
    }, err => {
        alert("Unable to get location: " + err.message);
    }, { enableHighAccuracy:true });
}

function stop(){
    if(watchId!==null){ navigator.geolocation.clearWatch(watchId); watchId=null; }
    document.getElementById("dot").classList.remove("bg-green-500","pulse");
    document.getElementById("dot").classList.add("bg-slate-400");
    document.getElementById("statusText").innerText = "GPS Off";
    document.getElementById("coords").innerText = "Location sharing stopped";
    document.getElementById("stopBtn").classList.add("hidden");
    document.getElementById("startBtn").classList.remove("hidden");
}
</script>


<!-- ============ UNIVERSAL BACK BUTTON (added) ============ -->
<style>
#globalBackBtn{
    position:fixed;
    top:14px;
    right:14px;
    z-index:99999;
    background:#1e293b;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    font-weight:700;
    font-family:'Inter',sans-serif;
    font-size:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
    cursor:pointer;
}
#globalBackBtn:hover{ background:#0f172a; }
@media (max-width:600px){
    #globalBackBtn{
        top:8px;
        right:8px;
        padding:8px 14px;
        font-size:13px;
    }
}
</style>
<button id="globalBackBtn" onclick="(function(){ if(window.history.length>1){ window.history.back(); } else { window.location.href='index.html'; } })()">← Back</button>
<!-- ============ END BACK BUTTON ============ -->

</body>
</html>
