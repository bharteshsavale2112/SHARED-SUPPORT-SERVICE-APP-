<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bajaj Auto - Bus Pass Request</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Inter',sans-serif;
    background:#f1f5f9;
}

.card{
    max-width:850px;
    margin:30px auto;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.header{
    background:linear-gradient(135deg,#0056b3,#003f85);
    color:white;
    padding:30px;
}

.input-box{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:12px;
    margin-top:5px;
}

.input-box:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

.btn{
    width:100%;
    background:#0056b3;
    color:white;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#003f85;
}

.readonly-field{
    background:#f3f4f6;
    color:#374151;
    cursor:not-allowed;
}

.back-btn{
    display:inline-block;
    margin-bottom:15px;
    color:#0056b3;
    font-weight:600;
    text-decoration:none;
}

.back-btn:hover{
    text-decoration:underline;
}

</style>


<!-- ============ AUTO LOGOUT / SESSION GUARD (added) ============ -->
<script>
(function(){
    async function verifySession(){
        try{
            const res = await fetch("/check-session", { cache: "no-store" });
            if(!res.ok){
                window.location.href = "employeelogin.html";
            }
        } catch(e){
            window.location.href = "employeelogin.html";
        }
    }
    verifySession();
    window.addEventListener("pageshow", function(event){
        if(event.persisted){ verifySession(); }
    });
})();
</script>
<!-- ============ END SESSION GUARD ============ -->

</head>

<body>

<div class="card">

    <div class="header">

        <h1 class="text-3xl font-extrabold">
            BAJAJ AUTO
        </h1>

        <p class="mt-2 text-blue-100">
            Employee Bus Pass Request Form
        </p>

    </div>

    <div class="p-6">

        <a href="employee-dashboard.html" class="back-btn">
            ← Back To Home
        </a>

        <form
            id="busPassForm"
            class="space-y-4">

            <!-- Employee Details -->

            <div class="grid md:grid-cols-2 gap-4">

                <div>
                    <label class="font-semibold">
                        Employee Code
                    </label>

                    <input
                        type="text"
                        name="employeeCode"
                        class="input-box"
                        placeholder="Enter Employee Code"
                        required>
                </div>

                <div>
                    <label class="font-semibold">
                        Employee Name
                    </label>

                    <input
                        type="text"
                        name="employeeName"
                        class="input-box"
                        placeholder="Enter Employee Name"
                        required>
                </div>

            </div>

            <!-- Department -->

            <div class="grid md:grid-cols-2 gap-4">

                <div>

                    <label class="font-semibold">
                        Department
                    </label>

                    <select
                        name="department"
                        class="input-box"
                        required>

                        <option value="">
                            Select Department
                        </option>

                        <option>Production</option>
                        <option>Assembly</option>
                        <option>Paint Shop</option>
                        <option>Weld Shop</option>
                        <option>Quality</option>
                        <option>Maintenance</option>
                        <option>Logistics</option>
                        <option>Stores</option>
                        <option>Purchase</option>
                        <option>Finance</option>
                        <option>HR</option>
                        <option>IT</option>
                        <option>Administration</option>
                        <option>Safety</option>

                    </select>

                </div>

                <div>

                    <label class="font-semibold">
                        Mobile Number
                    </label>

                    <input
                        type="tel"
                        name="mobile"
                        class="input-box"
                        placeholder="Enter Mobile Number"
                        required>

                </div>

            </div>

            <!-- Shift -->

            <div class="grid md:grid-cols-2 gap-4">

                <div>

                    <label class="font-semibold">
                        Shift
                    </label>

                    <select
                        name="shift"
                        class="input-box"
                        required>

                        <option value="">
                            Select Shift
                        </option>

                        <option>1st Shift</option>
                        <option>2nd Shift</option>
                        <option>3rd Shift</option>
                        <option>OT</option>
                        <option>General Shift</option>

                    </select>

                </div>

                <div>

                    <label class="font-semibold">
                        Gender
                    </label>

                    <select
                        name="gender"
                        class="input-box"
                        required>

                        <option value="">
                            Select Gender
                        </option>

                        <option>Male</option>
                        <option>Female</option>

                    </select>

                </div>

            </div>

            <!-- Route -->

            <div class="grid md:grid-cols-2 gap-4">

                <div>

                    <label class="font-semibold">
                        Route Number
                    </label>

                    <input
                        type="text"
                        name="routeNumber"
                        class="input-box"
                        placeholder="Enter Route Number"
                        required>

                </div>

                <div>

                    <label class="font-semibold">
                        Pickup Location
                    </label>

                    <input
                        type="text"
                        name="pickupLocation"
                        class="input-box"
                        placeholder="Enter Pickup Location"
                        required>

                </div>

            </div>

            <!-- Drop -->

            <div>

                <label class="font-semibold">
                    Drop Location
                </label>

                <input
                    type="text"
                    name="dropLocation"
                    class="input-box readonly-field"
                    value="Bajaj Chakan Plant 1"
                    readonly>

            </div>

            <!-- Photo Upload -->

            

            <!-- Address -->

            <div>

                <label class="font-semibold">
                    Residential Address
                </label>

                <textarea
                    name="address"
                    class="input-box"
                    rows="3"
                    placeholder="Enter Full Address"
                    required></textarea>

            </div>

            <button type="submit" class="btn">
                Submit Bus Pass Request
            </button>

        </form>

        <div id="result" class="mt-4"></div>

    </div>

</div>

<script>
const savedEmployeeCode = localStorage.getItem("employeeCode");
if (savedEmployeeCode) {
    document.querySelector('[name="employeeCode"]').value = savedEmployeeCode;
}

document.getElementById("busPassForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const resultBox = document.getElementById("result");

    const employeeCode = document
        .querySelector('[name="employeeCode"]')
        .value.trim();

    try {

        const response = await fetch("/request-pass", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ employeeCode: employeeCode })
        });

        const data = await response.json();

        if (data.status !== "success") {
            resultBox.innerHTML =
                '<p class="text-red-600 font-semibold">' +
                (data.message || "Something went wrong") +
                "</p>";
            return;
        }

        resultBox.innerHTML =
            '<p class="text-green-600 font-semibold">' +
            data.message +
            "</p>";

        document.getElementById("busPassForm").reset();

        if (savedEmployeeCode) {
            document.querySelector('[name="employeeCode"]').value = savedEmployeeCode;
        }

    } catch (err) {
        console.log(err);
        resultBox.innerHTML =
            '<p class="text-red-600 font-semibold">Server Error. Please try again.</p>';
    }

});
</script>

</body>
</html>
