// ================= RENDER ROUTE CARDS FOR SELECTED SHIFT =================
const shiftSelectEl = document.getElementById("shiftSelect");
const routesGrid = document.getElementById("routesGrid");

function renderRoutes(shift){

routesGrid.innerHTML = "";

if(!shift){
    routesGrid.innerHTML = '<p class="text-gray-300 col-span-2 text-center">👆 Route list dekhne ke liye pehle apni shift select karo.</p>';
    return;
}

const routes = SHIFT_ROUTES[shift] || {};
const routeNames = Object.keys(routes);

if(routeNames.length === 0){
    routesGrid.innerHTML = '<p class="text-gray-300 col-span-2 text-center">Is shift ke liye abhi koi route configure nahi hai.</p>';
    return;
}

routeNames.forEach(routeName=>{

    const stops = routes[routeName];
    const from = stops[0];
    const to = stops[stops.length-1];

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <h2 class="text-xl font-bold text-yellow-300">${routeName}</h2>
        <p>${from} → ${to}</p>
        <button class="btn blue">📍 Show Stops</button>
        <button class="btn green">🚍 Live Tracking</button>
    `;

    const [stopsBtn, trackBtn] = card.querySelectorAll("button");
    stopsBtn.onclick = ()=> showStops(routeName);
    trackBtn.onclick = ()=> openTracking(routeName);

    routesGrid.appendChild(card);
});

}

shiftSelectEl.addEventListener("change", function(){
    currentShift = shiftSelectEl.value;
    renderRoutes(currentShift);
});

// ================= SHOW STOPS =================
function showStops(routeName){

document.getElementById("stopsModal").style.display="block";

let list=document.getElementById("stopsList");
list.innerHTML="";

const stops = (SHIFT_ROUTES[currentShift] && SHIFT_ROUTES[currentShift][routeName]) || [];

stops.forEach(s=>{
let div=document.createElement("div");
div.className="stop";
div.innerHTML="📍 "+s;
list.appendChild(div);
});

}

function closeStops(){
document.getElementById("stopsModal").style.display="none";
}

// ================= LIVE TRACK =================
function openTracking(r){

route=r;
document.getElementById("routeName").innerText=r+" ("+currentShift+")";
document.getElementById("trackingModal").style.display="block";

setTimeout(()=>{

if(map) map.remove();

map=L.map('map').setView([18.5204,73.8567],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// BAJAJ ICON (OPTIONAL)
let icon=L.icon({
iconUrl:"Bajaj.png",
iconSize:[45,45]
});

marker=L.marker([18.5204,73.8567],{icon}).addTo(map);

// ROUTE LINE
routeLine=L.polyline([],{
color:"#00ff88",
weight:4
}).addTo(map);

if(interval) clearInterval(interval);

interval=setInterval(updateBus,2000);

},300);

}

// ================= LIVE UPDATE =================
async function updateBus(){

let res=await fetch(`/live-location/${encodeURIComponent(route)}`);
let data=await res.json();

if(data.success){

let lat=data.lat;
let lng=data.lng;

// smooth movement
marker.setLatLng([lat,lng]);
map.panTo([lat,lng]);

// route line
routeLine.addLatLng([lat,lng]);

document.getElementById("lat").innerText=lat;
document.getElementById("lng").innerText=lng;

}

}

// ================= CLOSE =================
function closeTracking(){
document.getElementById("trackingModal").style.display="none";
if(interval) clearInterval(interval);
}

// ================= AUTO-OPEN FROM SHARED LINK =================
// When admin shares a link like viewroots.html?shift=1st%20Shift&route=Route%201%20(LONI%20KALBHOR)
// this jumps straight into live tracking for that shift+route, no manual selection needed.
(function autoOpenFromSharedLink(){

const params = new URLSearchParams(window.location.search);
const qShift = params.get("shift");
const qRoute = params.get("route");

if(qShift && SHIFT_ROUTES[qShift]){

    currentShift = qShift;
    shiftSelectEl.value = qShift;
    renderRoutes(qShift);

    if(qRoute && SHIFT_ROUTES[qShift][qRoute]){
        setTimeout(()=> openTracking(qRoute), 200);
    }
}

})();

</script>
