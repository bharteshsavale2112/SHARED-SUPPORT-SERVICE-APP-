<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bajaj Transport System</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

/* BACKGROUND + BAJAJ LOGO WATERMARK */
body{
font-family:Inter;
background:
url("https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Bajaj_Auto_Logo.svg/512px-Bajaj_Auto_Logo.svg.png")
no-repeat center center,
linear-gradient(135deg,#0f172a,#1e293b);

background-size:300px, cover;
min-height:100vh;
color:white;
}

/* EXTRA WATERMARK LAYER */
.watermark{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
opacity:0.05;
z-index:-1;
pointer-events:none;
}

.watermark img{
width:500px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter: blur(10px);
border-radius:20px;
padding:20px;
border:1px solid rgba(255,255,255,0.2);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

/* BUTTONS */
.btn{
padding:10px;
border-radius:12px;
width:100%;
font-weight:bold;
margin-top:10px;
}

.blue{background:#2563eb;}
.green{background:#16a34a;}

/* MAP */
#map{
width:100%;
height:60vh;
border-radius:15px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
padding:20px;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:20px;
max-width:900px;
margin:80px auto;
}

.stop{
padding:8px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<!-- BAJAJ WATERMARK -->
<div class="watermark">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Bajaj_Auto_Logo.svg/512px-Bajaj_Auto_Logo.svg.png">
</div>

<!-- HEADER -->
<div class="text-center py-6">
<h1 class="text-3xl font-bold">🚍 BAJAJ LIVE TRANSPORT</h1>
<p class="text-gray-200">Real-Time Bus Tracking System</p>
</div>

<!-- ROUTES -->
<div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-6 p-6">

<!-- ROUTE 02 -->
<div class="card">
<h2 class="text-xl font-bold text-yellow-300">Route 02</h2>
<p>Nigdi → Chakan</p>

<button onclick="showStops('Route-02')" class="btn blue">📍 Show Stops</button>
<button onclick="openTracking('Route-02')" class="btn green">🚍 Live Tracking</button>
</div>

<!-- ROUTE 03 -->
<div class="card">
<h2 class="text-xl font-bold text-yellow-300">Route 03</h2>
<p>Bhosari → Hinjewadi</p>

<button onclick="showStops('Route-03')" class="btn blue">📍 Show Stops</button>
<button onclick="openTracking('Route-03')" class="btn green">🚍 Live Tracking</button>
</div>

</div>

<!-- ================= STOPS MODAL ================= -->
<div id="stopsModal" class="modal">

<div class="box">

<h2 class="text-xl font-bold">🚌 Route Stops</h2>

<div id="stopsList" class="mt-3"></div>

<br>
<button onclick="closeStops()" class="btn blue">Close</button>

</div>
</div>

<!-- ================= TRACKING MODAL ================= -->
<div id="trackingModal" class="modal">

<div class="box">

<div class="flex justify-between">
<h2 class="text-xl font-bold">📍 Live Tracking</h2>
<button onclick="closeTracking()">❌</button>
</div>

<h3 id="routeName" class="mt-2 font-bold text-blue-600">--</h3>

<div id="map" class="mt-4"></div>

<br>

<p>Latitude: <span id="lat">--</span></p>
<p>Longitude: <span id="lng">--</span></p>

</div>
</div>

<script>

let map, marker, routeNumber="", interval, routeLine;

// STOP DATA
let stopsData = {
  "RouteNumber-02": ["Nigdi", "Akurdi", "Chinchwad", "Talegaon", "Chakan"],
  "RouteNumber-03": ["Bhosari", "Dighi", "Wakad", "Hinjewadi"]
};

// ================= SHOW STOPS =================
function showStops(r){

document.getElementById("stopsModal").style.display="block";

let list=document.getElementById("stopsList");
list.innerHTML="";

stopsData[r].forEach(s=>{
let div=document.createElement("div");
div.className="stop";
div.innerHTML="📍 "+s;
list.appendChild(div);
});

}

function closeStops(){
document.getElementById("stopsModal").style.display="none";
}

// ================= LIVE TRACK =================
function openTracking(r){

route=r;
document.getElementById("routeName").innerText=r;
document.getElementById("trackingModal").style.display="block";

setTimeout(()=>{

if(map) map.remove();

map=L.map('map').setView([18.5204,73.8567],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// BAJAJ ICON (OPTIONAL)
let icon=L.icon({
iconUrl:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Bajaj_Auto_Logo.svg/512px-Bajaj_Auto_Logo.svg.png",
iconSize:[45,45]
});

marker=L.marker([18.5204,73.8567],{icon}).addTo(map);

// ROUTE LINE
routeLine=L.polyline([],{
color:"#00ff88",
weight:4
}).addTo(map);

if(interval) clearInterval(interval);

interval=setInterval(updateBus,2000);

},300);

}

// ================= LIVE UPDATE =================
async function updateBus(){

let res=await fetch(`/live-location/${route}`);
let data=await res.json();

if(data.success){

let lat=data.lat;
let lng=data.lng;

// smooth movement
marker.setLatLng([lat,lng]);
map.panTo([lat,lng]);

// route line
routeLine.addLatLng([lat,lng]);

document.getElementById("lat").innerText=lat;
document.getElementById("lng").innerText=lng;

}

}

// ================= CLOSE =================
function closeTracking(){
document.getElementById("trackingModal").style.display="none";
if(interval) clearInterval(interval);
}

</script>

</body>
</html>
