<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bajaj Auto - Temporary Bus Pass</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Inter',sans-serif;
    background:#f1f5f9;
}

.card{
    max-width:900px;
    margin:30px auto;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.header{
    background:linear-gradient(135deg,#dc2626,#991b1b);
    color:white;
    padding:30px;
}

.input-box{
    width:100%;
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:12px;
    margin-top:5px;
}

.input-box:focus{
    outline:none;
    border-color:#dc2626;
    box-shadow:0 0 0 3px rgba(220,38,38,.15);
}

.readonly{
    background:#f3f4f6;
    cursor:not-allowed;
}

.btn{
    width:100%;
    background:#dc2626;
    color:white;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#b91c1c;
}

.notice{
    background:#fef3c7;
    border-left:5px solid #f59e0b;
    color:#92400e;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    font-weight:600;
}

.success{
    display:none;
    background:#dcfce7;
    color:#166534;
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

</style>

<!-- ============ AUTO LOGOUT / SESSION GUARD (added) ============ -->
<script>
(function(){
    async function verifySession(){
        try{
            const res = await fetch("/check-session", { cache: "no-store" });
            if(!res.ok){
                window.location.href = "employeelogin.html";
            }
        } catch(e){
            window.location.href = "employeelogin.html";
        }
    }
    verifySession();
    window.addEventListener("pageshow", function(event){
        if(event.persisted){ verifySession(); }
    });
})();
</script>
<!-- ============ END SESSION GUARD ============ -->

</head>

<body>

<div class="card">

    <div class="header">

        <h1 class="text-3xl font-extrabold">
            BAJAJ AUTO
        </h1>

        <p class="text-red-100 mt-2">
            Temporary Bus Pass Request
        </p>

    </div>

    <div class="p-6">

        <div class="notice">
            ⚠ Temporary Bus Pass is valid for only 12 Hours.
        </div>

        <form id="tempPassForm" class="space-y-4">

            <div class="grid md:grid-cols-2 gap-4">

                <div>
                    <label class="font-semibold">
                        Employee Code
                    </label>
                    <input type="text"
                           id="employeeCode"
                           class="input-box readonly"
                           readonly
                           required>
                </div>

                <div>
                    <label class="font-semibold">
                        Employee Name
                    </label>
                    <input type="text"
                           id="employeeName"
                           class="input-box"
                           required>
                </div>

            </div>

            <div class="grid md:grid-cols-2 gap-4">

                <div>
                    <label class="font-semibold">
                        Department
                    </label>

                    <select id="department" class="input-box" required>
                       <option value="">Select Department</option>
                        <option>Production</option>
                        <option>Quality</option>
                        <option>Maintenance</option>
                        <option>HR</option>
                        <option>Administration</option>
                        <option>Alluminium Shop</option>
                        <option>BU HR -Operations</option>
                        <option>Central Maintenance</option>
                        <option>Assembly Planned Maint</option>
                        <option>Chassis Sub Assembly Center</option>
                        <option>Civil</option>
                        <option>Dispensary</option>
                        <option>Civil & Utility</option>
                        <option>Engine Assembly Line-KTM</option>
                        <option>Engine Assembly</option>
                        <option>Export</option>
                        <option>Exoprt Assembly CKD</option>
                        <option>Export Open</option>
                        <option>Facility Engineering</option>
                        <option>Flying Start GT-OP</option>
                        <option>HRD</option>
                        <option>Machining</option>
                        <option>Maintenance</option>
                        <option>Manufacturing Check</option>
                        <option>Manufacturing Engine</option>
                        <option>ME (E&T)</option>
                        <option>ME(Vehicle)</option>
                        <option>Paint Shop</option>
                        <option>Personnel</option>
                        <option>PPC</option>
                        <option>Production</option>
                        <option>Production Planning</option>
                        <option>Vehicel Assembly-Pulsar</option>
                        <option>Quality</option>
                        <option>Quality Assurance</option>
                        <option>Reliability Sub Vehicle</option>
                        <option>Reliability Supply Vehicle</option>
                        <option>Safety</option>
                        <option>Security</option>
                        <option>Steel Shop</option>
                        <option>Steel Shop (C-10)</option>
                        <option>Time Office</option>
                        <option>Tool Room</option>
                        <option>TPM</option>
                        <option>Utilities & Services</option>
                        <option>Vehicle Assembly Electric</option>
                        <option>Vehicle Dispatch </option>
                        <option>Vehicle Assembly</option>
                        <option>Works Admin (C-01)</option>

                    </select>

                </div>

                <div>
                    <label class="font-semibold">
                        Mobile Number
                    </label>

                    <input type="tel"
                           id="mobile"
                           class="input-box"
                           required>
                </div>

            </div>

            <div>

                <label class="font-semibold">
                    Reason For Temporary Pass
                </label>

                <select id="reason" class="input-box" required>
                    <option value="">Select Reason</option>
                    <option>Forgot Bus Pass</option>
                    <option>Lost Bus Pass</option>
                    <option>New Employee</option>
                    <option>Emergency Travel</option>
                    <option>Visitor</option>
                    <option>Other</option>
                </select>

            </div>

            <div class="grid md:grid-cols-2 gap-4">

                <div>
                    <label class="font-semibold">
                        Pickup Location
                    </label>

                    <input type="text"
                           id="pickupLocation"
                           class="input-box"
                           placeholder="Enter Pickup Location"
                           required>
                </div>

                <div>
                    <label class="font-semibold">
                        Drop Location
                    </label>

                    <input type="text"
                           id="dropLocation"
                           value="Bajaj Chakan Plant 1"
                           class="input-box readonly"
                           readonly>
                </div>

            </div>

            <div>

                <label class="font-semibold">
                    Travel Date & Time
                </label>

                <input type="datetime-local"
                       id="travelTime"
                       class="input-box"
                       required>

            </div>

            <button type="submit" class="btn">
                Submit Temporary Pass Request
            </button>

        </form>

        <div id="successMsg" class="success">
            Temporary Bus Pass Request Submitted Successfully!
        </div>

        <div class="mt-4 text-center">
            <a href="my-temp-pass.html" class="text-red-600 font-semibold underline">
                View / Download My Temporary Pass →
            </a>
        </div>

    </div>

</div>

<script>

const travelTime = document.getElementById("travelTime");

const now = new Date();

const maxTime = new Date(
    now.getTime() + (12 * 60 * 60 * 1000)
);

travelTime.min = now.toISOString().slice(0,16);
travelTime.max = maxTime.toISOString().slice(0,16);

// Employee Code auto-fill (from login)
const savedEmployeeCode = localStorage.getItem("employeeCode");
if (savedEmployeeCode) {
    document.getElementById("employeeCode").value = savedEmployeeCode;
}

document.getElementById("tempPassForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const selectedTime = new Date(travelTime.value);

    if(selectedTime > maxTime){

        alert(
        "Temporary Pass cannot be issued for more than 12 hours."
        );

        return;
    }

    const payload = {
        employeeCode: document.getElementById("employeeCode").value.trim(),
        employeeName: document.getElementById("employeeName").value.trim(),
        department: document.getElementById("department").value,
        mobile: document.getElementById("mobile").value.trim(),
        reason: document.getElementById("reason").value,
        pickupLocation: document.getElementById("pickupLocation").value.trim(),
        dropLocation: document.getElementById("dropLocation").value,
        travelDateTime: travelTime.value
    };

    try {

        const response = await fetch("/request-temp-pass", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.status !== "success") {
            alert(data.message || "Something went wrong");
            return;
        }

        document.getElementById("successMsg").style.display = "block";
        document.getElementById("tempPassForm").reset();

        if (savedEmployeeCode) {
            document.getElementById("employeeCode").value = savedEmployeeCode;
        }

        setTimeout(() => {
            document.getElementById("successMsg").style.display = "none";
        }, 4000);

    } catch (err) {
        console.log(err);
        alert("Server Error. Please try again.");
    }

});

</script>

</html>
