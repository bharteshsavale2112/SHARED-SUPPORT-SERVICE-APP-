<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Routes &amp; Bus Stops</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#f1f5f9;}
.field{width:100%;padding:10px 13px;border:1px solid #cbd5e1;border-radius:11px;background:#fff;font-size:14px;outline:none;}
.field:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15);}
.chip{display:inline-flex;align-items:center;gap:6px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;padding:6px 10px;border-radius:999px;font-size:13px;margin:3px;}
.chip button{color:#1d4ed8;font-weight:800;line-height:1;}
</style>

<!-- SESSION GUARD (admin only) -->
<script>
(function(){
    async function verify(){
        try{
            const res = await fetch("/check-session",{cache:"no-store"});
            if(!res.ok){ window.location.href="adminlogin.html"; return; }
            const d = await res.json();
            if(d.role !== "admin"){ window.location.href="adminlogin.html"; }
        }catch(e){ window.location.href="adminlogin.html"; }
    }
    verify();
    window.addEventListener("pageshow",function(e){ if(e.persisted){ verify(); } });
})();
</script>
</head>
<body>

<div class="max-w-6xl mx-auto px-4 py-8">

<div class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div>
        <h1 class="text-3xl font-extrabold text-slate-800">🚌 Manage Routes &amp; Bus Stops</h1>
        <p class="text-slate-500 mt-1">Add, edit, update &amp; delete routes and their bus stops</p>
    </div>
    <div class="flex gap-2">
        <a href="admin-dashboard.html" class="bg-white border border-slate-200 text-slate-700 px-4 py-2 rounded-xl font-semibold shadow-sm">🏠 Dashboard</a>
        <button id="saveAllBtn" onclick="saveAll()" class="bg-green-600 text-white px-5 py-2 rounded-xl font-semibold shadow-sm">💾 Save Changes</button>
    </div>
</div>

<div id="dirty" class="hidden mb-4 bg-amber-50 border border-amber-200 text-amber-800 px-4 py-3 rounded-xl text-sm">
    ⚠️ You have unsaved changes. Click <b>Save Changes</b> to apply them.
</div>

<!-- Shift selector -->
<div class="bg-white rounded-2xl shadow-sm p-4 mb-6 flex flex-col md:flex-row gap-3 md:items-center">
    <label class="font-semibold text-slate-600 whitespace-nowrap">Select Shift:</label>
    <select id="shiftSelect" class="field md:max-w-xs" onchange="renderRoutes()"></select>
    <div class="flex gap-2 flex-1">
        <input id="newShiftName" class="field" placeholder="New shift name (e.g. Night Shift)">
        <button onclick="addShift()" class="bg-slate-700 text-white px-4 py-2 rounded-xl font-semibold whitespace-nowrap">+ Shift</button>
    </div>
</div>

<!-- Add route -->
<div class="bg-white rounded-2xl shadow-sm p-4 mb-6 flex flex-col md:flex-row gap-3">
    <input id="newRouteName" class="field flex-1" placeholder="New route name (e.g. Route 42 (KATRAJ))">
    <button onclick="addRoute()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-semibold whitespace-nowrap">➕ Add Route</button>
</div>

<div id="routesWrap" class="grid grid-cols-1 gap-5"></div>

</div>

<script>
let ROUTES = {};
let DIRTY = false;

function markDirty(){ DIRTY=true; document.getElementById("dirty").classList.remove("hidden"); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function curShift(){ return document.getElementById("shiftSelect").value; }

async function load(){
    try{
        const res = await fetch("/routes",{cache:"no-store"});
        const d = await res.json();
        ROUTES = (d && d.routes) ? d.routes : {};
    }catch(e){ ROUTES = {}; }
    renderShiftOptions();
    renderRoutes();
}

function renderShiftOptions(keep){
    const sel = document.getElementById("shiftSelect");
    const prev = keep || sel.value;
    const shifts = Object.keys(ROUTES);
    sel.innerHTML = shifts.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("");
    if(prev && shifts.includes(prev)) sel.value = prev;
}

function addShift(){
    const name = document.getElementById("newShiftName").value.trim();
    if(!name) return;
    if(ROUTES[name]){ alert("Shift already exists"); return; }
    ROUTES[name] = {};
    document.getElementById("newShiftName").value="";
    markDirty();
    renderShiftOptions(name);
    document.getElementById("shiftSelect").value=name;
    renderRoutes();
}

function addRoute(){
    const s = curShift();
    if(!s){ alert("Add or select a shift first"); return; }
    const name = document.getElementById("newRouteName").value.trim();
    if(!name) return;
    if(ROUTES[s][name]){ alert("Route already exists in this shift"); return; }
    ROUTES[s][name] = [];
    document.getElementById("newRouteName").value="";
    markDirty();
    renderRoutes();
}

function deleteRoute(route){
    const s = curShift();
    if(!confirm("Delete route \""+route+"\" and all its bus stops?")) return;
    delete ROUTES[s][route];
    markDirty();
    renderRoutes();
}

function renameRoute(oldName, inputId){
    const s = curShift();
    const newName = document.getElementById(inputId).value.trim();
    if(!newName || newName===oldName) return;
    if(ROUTES[s][newName]){ alert("A route with that name already exists"); document.getElementById(inputId).value=oldName; return; }
    // preserve order
    const rebuilt = {};
    Object.keys(ROUTES[s]).forEach(k=>{
        if(k===oldName){ rebuilt[newName]=ROUTES[s][oldName]; }
        else { rebuilt[k]=ROUTES[s][k]; }
    });
    ROUTES[s]=rebuilt;
    markDirty();
    renderRoutes();
}

function addStop(route, inputId){
    const s = curShift();
    const val = document.getElementById(inputId).value.trim();
    if(!val) return;
    ROUTES[s][route].push(val);
    markDirty();
    renderRoutes();
}

function deleteStop(route, idx){
    const s = curShift();
    ROUTES[s][route].splice(idx,1);
    markDirty();
    renderRoutes();
}

function editStop(route, idx){
    const s = curShift();
    const cur = ROUTES[s][route][idx];
    const val = prompt("Edit bus stop name:", cur);
    if(val===null) return;
    const t = val.trim();
    if(!t){ return; }
    ROUTES[s][route][idx]=t;
    markDirty();
    renderRoutes();
}

function renderRoutes(){
    const s = curShift();
    const wrap = document.getElementById("routesWrap");
    if(!s || !ROUTES[s]){ wrap.innerHTML=`<div class="text-slate-400 text-center py-10">No shift selected.</div>`; return; }
    const routes = ROUTES[s];
    const names = Object.keys(routes);
    if(names.length===0){ wrap.innerHTML=`<div class="text-slate-400 text-center py-10">No routes yet. Add one above.</div>`; return; }

    wrap.innerHTML = names.map((r,ri)=>{
        const stops = routes[r]||[];
        const rid = "r"+ri;
        const chips = stops.map((st,si)=>`
            <span class="chip">${esc(st)}
                <button title="Edit" onclick="editStop(${JSON.stringify(r)},${si})">✎</button>
                <button title="Remove" onclick="deleteStop(${JSON.stringify(r)},${si})">✕</button>
            </span>`).join("") || `<span class="text-slate-400 text-sm">No bus stops yet.</span>`;
        return `
        <div class="bg-white rounded-2xl shadow-sm p-5">
            <div class="flex flex-col md:flex-row md:items-center gap-3 mb-4">
                <input id="${rid}name" class="field flex-1 font-semibold" value="${esc(r)}">
                <div class="flex gap-2">
                    <button onclick="renameRoute(${JSON.stringify(r)},'${rid}name')" class="bg-amber-500 text-white px-4 py-2 rounded-xl font-semibold text-sm">✏️ Rename</button>
                    <button onclick="deleteRoute(${JSON.stringify(r)})" class="bg-red-600 text-white px-4 py-2 rounded-xl font-semibold text-sm">🗑️ Delete Route</button>
                </div>
            </div>
            <div class="mb-3">${chips}</div>
            <div class="flex gap-2">
                <input id="${rid}stop" class="field flex-1" placeholder="Add bus stop…" onkeydown="if(event.key==='Enter'){addStop(${JSON.stringify(r)},'${rid}stop')}">
                <button onclick="addStop(${JSON.stringify(r)},'${rid}stop')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-semibold text-sm whitespace-nowrap">+ Stop</button>
            </div>
            <p class="text-slate-400 text-xs mt-2">${stops.length} stop(s)</p>
        </div>`;
    }).join("");
}

async function saveAll(){
    const btn = document.getElementById("saveAllBtn");
    btn.disabled=true; btn.innerHTML="Saving…";
    try{
        const res = await fetch("/admin/save-routes",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({routes:ROUTES})});
        const d = await res.json();
        alert(d.message || (d.status==="success"?"Saved":"Failed"));
        if(d.status==="success"){ DIRTY=false; document.getElementById("dirty").classList.add("hidden"); }
    }catch(e){ alert("Error: "+e); }
    btn.disabled=false; btn.innerHTML="💾 Save Changes";
}

window.addEventListener("beforeunload",function(e){ if(DIRTY){ e.preventDefault(); e.returnValue=""; } });
load();
</script>

<!-- ============ UNIVERSAL BACK BUTTON (added) ============ -->
<style>
#globalBackBtn{position:fixed;top:14px;right:14px;z-index:99999;background:#1e293b;color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:700;font-family:'Inter',sans-serif;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.2);cursor:pointer;}
#globalBackBtn:hover{background:#0f172a;}
@media (max-width:600px){#globalBackBtn{top:8px;right:8px;padding:8px 14px;font-size:13px;}}
</style>
<button id="globalBackBtn" onclick="(function(){ if(window.history.length>1){ window.history.back(); } else { window.location.href='admin-dashboard.html'; } })()">← Back</button>
<!-- ============ END BACK BUTTON ============ -->

</body>
</html>
