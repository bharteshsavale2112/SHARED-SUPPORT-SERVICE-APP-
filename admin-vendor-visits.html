<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bajaj Auto | Vendor Visits</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{font-family:'Inter',sans-serif;}
body{background:#f1f5f9;margin:0;}
.logo-tile{background:#fff;border-radius:12px;padding:6px 12px;display:inline-flex;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.logo-tile img{height:40px;width:auto;object-fit:contain;}
table{width:100%;border-collapse:collapse;}
th{background:#0056b3;color:#fff;padding:12px;text-align:left;font-size:13px;white-space:nowrap;}
td{padding:12px;border-bottom:1px solid #e5e7eb;font-size:13px;color:#334155;vertical-align:top;}
tr:hover td{background:#f8fafc;}
#backBtn{position:fixed;bottom:22px;right:22px;z-index:9999;background:#1e293b;color:#fff;border:none;padding:10px 18px;border-radius:12px;font-weight:700;font-size:14px;box-shadow:0 6px 16px rgba(0,0,0,.3);cursor:pointer;}
#backBtn:hover{background:#0f172a;}
@media(max-width:600px){#backBtn{bottom:16px;right:16px;padding:8px 14px;font-size:13px;}}
</style>
<script>
(function(){
  async function verifySession(){
    try{const res=await fetch("/check-session",{cache:"no-store"});if(!res.ok){window.location.href="adminlogin.html";}}catch(e){window.location.href="adminlogin.html";}
  }
  verifySession();
  window.addEventListener("pageshow",function(e){if(e.persisted){verifySession();}});
})();
</script>
<link rel="stylesheet" href="mobile.css">
</head>
<body>
<button id="backBtn" onclick="window.location.href='admin-dashboard.html'">← Back</button>
<header class="bg-white shadow sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
    <div class="logo-tile"><img src="logo.png" alt="Bajaj Auto"></div>
    <div><h1 class="font-extrabold text-blue-900 text-lg sm:text-xl">🧾 Vendor Visits</h1><p class="text-xs text-gray-500">Bajaj Auto Transport Management</p></div>
  </div>
</header>
<main class="max-w-7xl mx-auto px-4 py-8">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold text-slate-800">All Submissions</h2>
    <button onclick="loadData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl font-semibold text-sm">🔄 Refresh</button>
  </div>
  <div class="bg-white rounded-2xl shadow overflow-hidden" style="overflow-x:auto;">
    <table>
      <thead><tr><th>#</th><th>Day</th>
<th>Ticket</th>
<th>Name</th>
<th>Dept</th>
<th>Authorized Person</th>
<th>Vendor</th>
<th>Pickup</th>
<th>From</th>
<th>To</th>
<th>Purpose</th>
<th>Time</th>
</tr></thead>
      <tbody id="tbody"><tr><td colspan="12" style="text-align:center;">Loading…</td></tr></tbody>
    </table>
  </div>
</main>
<script>
async function loadData(){
  const tb=document.getElementById("tbody");
  tb.innerHTML='<tr><td colspan="12" style="text-align:center;">Loading…</td></tr>';
  try{
    const res=await fetch("/admin/vendor-visits",{cache:"no-store"});
    const data=await res.json();
    if(!Array.isArray(data) || data.length===0){
      tb.innerHTML='<tr><td colspan="12" style="text-align:center;padding:30px;color:#64748b;">No vendor visits submitted yet.</td></tr>';
      return;
    }
    tb.innerHTML="";
    data.reverse().forEach((item,i)=>{
      const tr=document.createElement("tr");
      tr.innerHTML=`<td>${i+1}</td><td>${item["_day"]||""}</td><td>${item["Ticket Number"]!==undefined?item["Ticket Number"]:""}</td><td>${item["Name"]!==undefined?item["Name"]:""}</td><td>${item["Department"]!==undefined?item["Department"]:""}</td><td>${item["Authorized Person"]!==undefined?item["Authorized Person"]:""}</td><td>${item["Vendor Name"]!==undefined?item["Vendor Name"]:""}</td><td>${item["Vendor Pickup Time"]!==undefined?item["Vendor Pickup Time"]:""}</td><td>${item["From Date"]!==undefined?item["From Date"]:""}</td><td>${item["To Date"]!==undefined?item["To Date"]:""}</td><td>${item["Purpose of Visit"]!==undefined?item["Purpose of Visit"]:""}</td><td>${item["Timestamp"]!==undefined?item["Timestamp"]:""}</td>`;
      tb.appendChild(tr);
    });
  }catch(e){ tb.innerHTML='<tr><td colspan="12" style="text-align:center;color:#dc2626;">Unable to load data</td></tr>'; }
}
loadData();
</script>
</body>
</html>
