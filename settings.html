<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings · Employee Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#f1f5f9;}
.card{transition:.2s;}
input,select,textarea{outline:none;}
.field{width:100%;padding:11px 14px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;font-size:14px;}
.field:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15);}
table{width:100%;border-collapse:collapse;}
th,td{padding:12px 14px;text-align:left;font-size:14px;border-bottom:1px solid #eef2f7;}
th{background:#f8fafc;color:#475569;font-weight:700;position:sticky;top:0;}
tbody tr:hover{background:#f1f5ff;}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:9998;padding:16px;}
.modal-bg.show{display:flex;}
</style>

<!-- SESSION GUARD (admin only) -->
<script>
(function(){
    async function verify(){
        try{
            const res = await fetch("/check-session",{cache:"no-store"});
            if(!res.ok){ window.location.href="adminlogin.html"; return; }
            const d = await res.json();
            if(d.role !== "admin"){ window.location.href="adminlogin.html"; }
        }catch(e){ window.location.href="adminlogin.html"; }
    }
    verify();
    window.addEventListener("pageshow",function(e){ if(e.persisted){ verify(); } });
})();
</script>
</head>
<body>

<div class="max-w-7xl mx-auto px-4 py-8">

<!-- Header -->
<div class="flex flex-wrap items-center justify-between gap-4 mb-8">
    <div>
        <h1 class="text-3xl font-extrabold text-slate-800">⚙️ Settings</h1>
        <p class="text-slate-500 mt-1">Employee Management · Add, edit, update &amp; delete employees</p>
    </div>
    <a href="admin-dashboard.html" class="bg-white border border-slate-200 text-slate-700 px-4 py-2 rounded-xl font-semibold shadow-sm">🏠 Dashboard</a>
</div>

<!-- KPIs -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white rounded-2xl p-5 shadow-sm card"><div class="text-2xl font-extrabold text-blue-600" id="kEmp">0</div><div class="text-slate-500 text-sm mt-1">Total Employees</div></div>
    <div class="bg-white rounded-2xl p-5 shadow-sm card"><div class="text-2xl font-extrabold text-green-600" id="kDept">0</div><div class="text-slate-500 text-sm mt-1">Departments</div></div>
    <div class="bg-white rounded-2xl p-5 shadow-sm card"><div class="text-2xl font-extrabold text-orange-500" id="kRoute">0</div><div class="text-slate-500 text-sm mt-1">Routes</div></div>
    <div class="bg-white rounded-2xl p-5 shadow-sm card"><div class="text-2xl font-extrabold text-purple-600" id="kShift">0</div><div class="text-slate-500 text-sm mt-1">Shifts</div></div>
</div>

<!-- Toolbar -->
<div class="bg-white rounded-2xl shadow-sm p-4 mb-4 flex flex-col md:flex-row gap-3 md:items-center md:justify-between">
    <input id="search" class="field md:max-w-md" placeholder="🔍 Search by code, name, department or route" onkeyup="renderTable()">
    <button onclick="openAdd()" class="bg-blue-600 text-white px-5 py-3 rounded-xl font-semibold whitespace-nowrap">➕ Add Employee</button>
</div>

<!-- Table -->
<div class="bg-white rounded-2xl shadow-sm overflow-hidden">
    <div style="max-height:60vh;overflow:auto;">
        <table>
            <thead>
                <tr>
                    <th>Code</th><th>Name</th><th>Department</th><th>Shift</th>
                    <th>Route</th><th>Bus Stop</th><th>Mobile</th><th class="text-right">Actions</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="8" class="text-center text-slate-400 py-8">Loading employees…</td></tr>
            </tbody>
        </table>
    </div>
</div>
<p class="text-slate-400 text-sm mt-3" id="countLine"></p>

</div>

<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="bg-white rounded-3xl w-full max-w-2xl shadow-2xl">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
        <h2 class="text-xl font-bold text-slate-800" id="modalTitle">Add Employee</h2>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">&times;</button>
    </div>
    <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="text-sm font-semibold text-slate-600">Employee Code *</label>
            <input id="fCode" class="field mt-1" placeholder="EMP001">
        </div>
        <div>
            <label class="text-sm font-semibold text-slate-600">Full Name *</label>
            <input id="fName" class="field mt-1" placeholder="John Doe">
        </div>
        <div>
            <label class="text-sm font-semibold text-slate-600">Department</label>
            <input id="fDept" class="field mt-1" placeholder="Engine Assly">
        </div>
        <div>
            <label class="text-sm font-semibold text-slate-600">Email</label>
            <input id="fEmail" class="field mt-1" placeholder="name@bajaj.com">
        </div>
        <div>
            <label class="text-sm font-semibold text-slate-600">Mobile</label>
            <input id="fMobile" class="field mt-1" placeholder="9876543210">
        </div>
        <div>
            <label class="text-sm font-semibold text-slate-600">Shift</label>
            <select id="fShift" class="field mt-1">
                <option value="">-- Select --</option>
                <option>1st Shift</option><option>2nd Shift</option>
                <option>3rd Shift</option><option>General Shift</option>
            </select>
        </div>
        <div>
            <label class="text-sm font-semibold text-slate-600">Route Number</label>
            <input id="fRouteNumber" class="field mt-1" placeholder="Route 1 (LONI KALBHOR)">
        </div>
        <div>
            <label class="text-sm font-semibold text-slate-600">Bus Stop</label>
            <input id="fBusStop" class="field mt-1" placeholder="Loni Gaon">
        </div>
        <div class="md:col-span-2">
            <label class="text-sm font-semibold text-slate-600">Address</label>
            <textarea id="fAddress" class="field mt-1" rows="2" placeholder="Address"></textarea>
        </div>
        <div class="md:col-span-2">
            <label class="text-sm font-semibold text-slate-600" id="pwdLabel">Password</label>
            <input id="fPassword" type="text" class="field mt-1" placeholder="Set / reset password (leave blank to keep unchanged)">
        </div>
    </div>
    <div class="flex justify-end gap-3 px-6 py-4 border-t border-slate-100">
        <button onclick="closeModal()" class="px-5 py-2.5 rounded-xl font-semibold text-slate-600 bg-slate-100">Cancel</button>
        <button id="saveBtn" onclick="saveEmployee()" class="px-6 py-2.5 rounded-xl font-semibold text-white bg-blue-600">Save</button>
    </div>
  </div>
</div>

<script>
let EMPLOYEES = [];
let EDIT_MODE = false;

async function loadEmployees(){
    try{
        const res = await fetch("/employees-json",{cache:"no-store"});
        if(!res.ok){ window.location.href="adminlogin.html"; return; }
        EMPLOYEES = await res.json();
        if(!Array.isArray(EMPLOYEES)) EMPLOYEES = [];
        updateKpis();
        renderTable();
    }catch(e){ console.log(e); }
}

function updateKpis(){
    const uniq = (k)=> new Set(EMPLOYEES.map(e=>String(e[k]||"").trim()).filter(Boolean)).size;
    document.getElementById("kEmp").innerHTML   = EMPLOYEES.length;
    document.getElementById("kDept").innerHTML  = uniq("department");
    document.getElementById("kRoute").innerHTML = uniq("routeNumber") || uniq("route");
    document.getElementById("kShift").innerHTML = uniq("shift");
}

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function renderTable(){
    const q = (document.getElementById("search").value||"").toLowerCase().trim();
    let rows = EMPLOYEES;
    if(q){
        rows = EMPLOYEES.filter(e=>{
            return ["employeeCode","employeeName","department","routeNumber","route","shift","busStop","mobile"]
                .some(k=> String(e[k]||"").toLowerCase().includes(q));
        });
    }
    const tb = document.getElementById("tbody");
    if(rows.length===0){
        tb.innerHTML = `<tr><td colspan="8" class="text-center text-slate-400 py-8">No employees found.</td></tr>`;
    }else{
        tb.innerHTML = rows.map(e=>`
            <tr>
                <td class="font-semibold">${esc(e.employeeCode)}</td>
                <td>${esc(e.employeeName)}</td>
                <td>${esc(e.department)}</td>
                <td>${esc(e.shift)}</td>
                <td>${esc(e.routeNumber||e.route)}</td>
                <td>${esc(e.busStop)}</td>
                <td>${esc(e.mobile)}</td>
                <td class="text-right whitespace-nowrap">
                    <button onclick='openEdit(${JSON.stringify(String(e.employeeCode))})' class="bg-amber-500 text-white px-3 py-1.5 rounded-lg text-sm font-semibold">✏️ Edit</button>
                    <button onclick='deleteEmployee(${JSON.stringify(String(e.employeeCode))})' class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold ml-1">🗑️ Delete</button>
                </td>
            </tr>`).join("");
    }
    document.getElementById("countLine").innerHTML = `Showing ${rows.length} of ${EMPLOYEES.length} employees`;
}

const FIELDS = ["fCode","fName","fDept","fEmail","fMobile","fShift","fRouteNumber","fBusStop","fAddress","fPassword"];
function clearForm(){ FIELDS.forEach(id=> document.getElementById(id).value=""); }

function openAdd(){
    EDIT_MODE=false;
    clearForm();
    document.getElementById("modalTitle").innerHTML="➕ Add Employee";
    document.getElementById("fCode").disabled=false;
    document.getElementById("pwdLabel").innerHTML="Password (default: bajaj123)";
    document.getElementById("modal").classList.add("show");
}

function openEdit(code){
    const e = EMPLOYEES.find(x=> String(x.employeeCode)===String(code));
    if(!e) return;
    EDIT_MODE=true;
    document.getElementById("modalTitle").innerHTML="✏️ Edit Employee";
    document.getElementById("fCode").value=e.employeeCode;
    document.getElementById("fCode").disabled=true;
    document.getElementById("fName").value=e.employeeName||"";
    document.getElementById("fDept").value=e.department||"";
    document.getElementById("fEmail").value=e.email||"";
    document.getElementById("fMobile").value=e.mobile||"";
    document.getElementById("fShift").value=e.shift||"";
    document.getElementById("fRouteNumber").value=e.routeNumber||e.route||"";
    document.getElementById("fBusStop").value=e.busStop||"";
    document.getElementById("fAddress").value=e.address||"";
    document.getElementById("fPassword").value="";
    document.getElementById("pwdLabel").innerHTML="Reset Password (leave blank to keep unchanged)";
    document.getElementById("modal").classList.add("show");
}

function closeModal(){ document.getElementById("modal").classList.remove("show"); }

async function saveEmployee(){
    const payload = {
        employeeCode: document.getElementById("fCode").value.trim(),
        employeeName: document.getElementById("fName").value.trim(),
        department:   document.getElementById("fDept").value.trim(),
        email:        document.getElementById("fEmail").value.trim(),
        mobile:       document.getElementById("fMobile").value.trim(),
        shift:        document.getElementById("fShift").value.trim(),
        routeNumber:  document.getElementById("fRouteNumber").value.trim(),
        busStop:      document.getElementById("fBusStop").value.trim(),
        address:      document.getElementById("fAddress").value.trim(),
        password:     document.getElementById("fPassword").value.trim()
    };
    if(!payload.employeeCode || !payload.employeeName){
        alert("Employee Code and Name are required."); return;
    }
    const url = EDIT_MODE ? "/admin/update-employee" : "/admin/add-employee";
    const btn = document.getElementById("saveBtn");
    btn.disabled=true; btn.innerHTML="Saving…";
    try{
        const res = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
        const d = await res.json();
        alert(d.message || (d.status==="success"?"Saved":"Failed"));
        if(d.status==="success"){ closeModal(); await loadEmployees(); }
    }catch(e){ alert("Error: "+e); }
    btn.disabled=false; btn.innerHTML="Save";
}

async function deleteEmployee(code){
    if(!confirm("Delete employee "+code+" ? This cannot be undone.")) return;
    try{
        const res = await fetch("/admin/delete-employee",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({employeeCode:code})});
        const d = await res.json();
        alert(d.message || "Done");
        if(d.status==="success") await loadEmployees();
    }catch(e){ alert("Error: "+e); }
}

document.getElementById("modal").addEventListener("click",function(e){ if(e.target===this) closeModal(); });
loadEmployees();
</script>

<!-- ============ UNIVERSAL BACK BUTTON (added) ============ -->
<style>
#globalBackBtn{position:fixed;top:14px;right:14px;z-index:99999;background:#1e293b;color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:700;font-family:'Inter',sans-serif;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.2);cursor:pointer;}
#globalBackBtn:hover{background:#0f172a;}
@media (max-width:600px){#globalBackBtn{top:8px;right:8px;padding:8px 14px;font-size:13px;}}
</style>
<button id="globalBackBtn" onclick="(function(){ if(window.history.length>1){ window.history.back(); } else { window.location.href='admin-dashboard.html'; } })()">← Back</button>
<!-- ============ END BACK BUTTON ============ -->

</body>
</html>
