<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bajaj Auto - Employee Registration</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    min-height:100vh;
    padding:30px;
}

.registration-card{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 25px 50px rgba(0,0,0,.25);
}

.left-panel{
    background:linear-gradient(135deg,#2563eb,#1e40af);
}

.form-control{
    width:100%;
    padding:14px;
    border:1px solid #dbeafe;
    border-radius:14px;
    outline:none;
    transition:.3s;
}

.form-control:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

.register-btn{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.register-btn:hover{
    transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="registration-card grid md:grid-cols-2">

    <div class="left-panel text-white p-10 flex flex-col justify-center">

        <div class="h-24 w-24 bg-white/20 rounded-3xl flex items-center justify-center text-5xl mb-6">
            🚌
        </div>

        <h1 class="text-4xl font-extrabold">
            BAJAJ AUTO
        </h1>

        <p class="mt-3 text-blue-100 text-lg">
            Employee Registration Portal
        </p>

        <div class="mt-8 space-y-4 text-sm">

            <div>✅ Employee Transport Access</div>
            <div>✅ Bus Pass Management</div>
            <div>✅ Shift Wise Registration</div>
            <div>✅ Plant 1 Transport System</div>

        </div>

    </div>

    <div class="p-8 md:p-10">

        <h2 class="text-3xl font-bold text-slate-800">
            Create Account
        </h2>

        <p class="text-slate-500 mt-2 mb-8">
            Register to access Bajaj Auto Transport Services
        </p>

        <form
            action="http://127.0.0.1:5000/employee-registration"
            method="POST"
            class="space-y-4">

            <div>
                <label class="block text-sm font-semibold mb-2">
                    Employee Code
                </label>

                <input
                type="text"
                name="employeeCode"
                class="form-control"
                placeholder="Enter Employee Code"
                required>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">
                    Employee Name
                </label>

                <input
                type="text"
                name="employeeName"
                class="form-control"
                placeholder="Enter Employee Name"
                required>
            </div>

            <div class="grid md:grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-semibold mb-2">
                        Mobile Number
                    </label>

                    <input
                    type="tel"
                    name="mobile"
                    class="form-control"
                    placeholder="Mobile Number"
                    required>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">
                        Department
                    </label>

                    <select
                    name="department"
                    class="form-control"
                    required>

                        <option value="">Select Department</option>
                        <option>Production</option>
                        <option>Quality</option>
                        <option>Maintenance</option>
                        <option>HR</option>
                        <option>IT</option>
                        <option>Finance</option>

                    </select>
                </div>

            </div>

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Email Address
                </label>

                <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter Email Address"
                required>

            </div>

            <div class="grid md:grid-cols-2 gap-4">

                <div>

                    <label class="block text-sm font-semibold mb-2">
                        Shift
                    </label>

                    <select
                    name="shift"
                    class="form-control">

                        <option>1st Shift</option>
                        <option>2nd Shift</option>
                        <option>3rd Shift</option>
                        <option>General Shift</option>

                    </select>

                </div>

                <div>

                    <label class="block text-sm font-semibold mb-2">
                        Bus Stop
                    </label>

                    <input
                    type="text"
                    name="busStop"
                    class="form-control"
                    placeholder="Bus Stop">

                </div>

            </div>

            <div class="grid md:grid-cols-2 gap-4">

    <div>

        <label class="block text-sm font-semibold mb-2">
            Route Number
        </label>

        <input
        type="number"
        name="routeNumber"
        class="form-control"
        placeholder="Enter Route Number"
        required>

    </div>

            <div>

<label class="block text-sm font-semibold mb-2">
Password
</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Create Password"
required>

</div>

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Address
                </label>

                <textarea
                name="address"
                rows="3"
                class="form-control"
                placeholder="Enter Address"></textarea>

            </div>

            <button
            type="submit"
            class="register-btn w-full text-white p-4 rounded-xl font-bold text-lg transition">

                Register Employee

            </button>

        </form>

        <div class="text-center mt-6">

            <a href="employeelogin.html"
            class="text-blue-600 font-semibold">

                Already have an account? Login

            </a>

        </div>

    </div>

</div>

</body>
</html>
