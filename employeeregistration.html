<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bajaj Auto - Employee Registration</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    min-height:100vh;
    padding:30px;
}

.registration-card{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 25px 50px rgba(0,0,0,.25);
}

.left-panel{
    background:linear-gradient(135deg,#2563eb,#1e40af);
}

.form-control{
    width:100%;
    padding:14px;
    border:1px solid #dbeafe;
    border-radius:14px;
    outline:none;
    transition:.3s;
}

.form-control:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 4px rgba(37,99,235,.15);
}

.register-btn{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.register-btn:hover{
    transform:translateY(-2px);
}

/* ===== SEARCHABLE SELECT (Route Number / Bus Stop) ===== */

.searchable-select{
    position:relative;
}

.searchable-select.disabled .ss-input{
    background:#f1f5f9;
    cursor:not-allowed;
}

.ss-options{
    display:none;
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    right:0;
    background:white;
    border:1px solid #dbeafe;
    border-radius:14px;
    max-height:220px;
    overflow-y:auto;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
    z-index:50;
}

.searchable-select.open .ss-options{
    display:block;
}

.ss-option{
    padding:12px 14px;
    cursor:pointer;
    font-size:14px;
}

.ss-option:hover,
.ss-option.active{
    background:#eff6ff;
    color:#1d4ed8;
}

.ss-no-result{
    padding:12px 14px;
    font-size:14px;
    color:#94a3b8;
}

</style>

</head>

<body>

<div class="registration-card grid md:grid-cols-2">

    <div class="left-panel text-white p-10 flex flex-col justify-center">

        <div class="h-24 w-24 bg-white/20 rounded-3xl flex items-center justify-center text-5xl mb-6">
            🚌
        </div>

        <h1 class="text-4xl font-extrabold">
            BAJAJ AUTO
        </h1>

        <p class="mt-3 text-blue-100 text-lg">
            Employee Registration Portal
        </p>

        <div class="mt-8 space-y-4 text-sm">

            <div>✅ Employee Transport Access</div>
            <div>✅ Bus Pass Management</div>
            <div>✅ Shift Wise Registration</div>
            <div>✅ Plant 1 Transport System</div>

        </div>

    </div>

    <div class="p-8 md:p-10">

        <h2 class="text-3xl font-bold text-slate-800">
            Create Account
        </h2>

        <p class="text-slate-500 mt-2 mb-8">
            Register to access Bajaj Auto Transport Services
        </p>

        <form
            action="/employee-registration"
            method="POST"
            class="space-y-4">

            <div>
                <label class="block text-sm font-semibold mb-2">
                    Employee Code
                </label>

                <input
                type="text"
                name="employeeCode"
                class="form-control"
                placeholder="Enter Employee Code"
                required>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-2">
                    Employee Name
                </label>

                <input
                type="text"
                name="employeeName"
                class="form-control"
                placeholder="Enter Employee Name"
                required>
            </div>

            <div class="grid md:grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-semibold mb-2">
                        Mobile Number
                    </label>

                    <input
                    type="tel"
                    name="mobile"
                    class="form-control"
                    placeholder="Mobile Number"
                    required>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2">
                        Department
                    </label>

                    <select
                    name="department"
                    class="form-control"
                    required>

                        <option value="">Select Department</option>
                        <option>Production</option>
                        <option>Quality</option>
                        <option>Maintenance</option>
                        <option>HR</option>
                        <option>Administration</option>
                        <option>Alluminium Shop</option>
                        <option>BU HR -Operations</option>
                        <option>Central Maintenance</option>
                        <option>Assembly Planned Maint</option>
                        <option>Chassis Sub Assembly Center</option>
                        <option>Civil</option>
                        <option>Dispensary</option>
                        <option>Civil & Utility</option>
                        <option>Engine Assembly Line-KTM</option>
                        <option>Engine Assembly</option>
                        <option>Export</option>
                        <option>Exoprt Assembly CKD</option>
                        <option>Export Open</option>
                        <option>Facility Engineering</option>
                        <option>Flying Start GT-OP</option>
                        <option>HRD</option>
                        <option>Machining</option>
                        <option>Maintenance</option>
                        <option>Manufacturing Check</option>
                        <option>Manufacturing Engine</option>
                        <option>ME (E&T)</option>
                        <option>ME(Vehicle)</option>
                        <option>Paint Shop</option>
                        <option>Personnel</option>
                        <option>PPC</option>
                        <option>Production</option>
                        <option>Production Planning</option>
                        <option>Vehicel Assembly-Pulsar</option>
                        <option>Quality</option>
                        <option>Quality Assurance</option>
                        <option>Reliability Sub Vehicle</option>
                        <option>Reliability Supply Vehicle</option>
                        <option>Safety</option>
                        <option>Security</option>
                        <option>Steel Shop</option>
                        <option>Steel Shop (C-10)</option>
                        <option>Time Office</option>
                        <option>Tool Room</option>
                        <option>TPM</option>
                        <option>Utilities & Services</option>
                        <option>Vehicle Assembly Electric</option>
                        <option>Vehicle Dispatch </option>
                        <option>Vehicle Assembly</option>
                        <option>Works Admin (C-01)</option>


                    </select>
                </div>

            </div>

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Email Address
                </label>

                <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter Email Address"
                required>

            </div>

            <div class="grid md:grid-cols-2 gap-4">

                <div>

                    <label class="block text-sm font-semibold mb-2">
                        Shift
                    </label>

                    <select
                    name="shift"
                    class="form-control"
                    id="shiftSelect"
                    required>

                        <option value="">Select Shift</option>
                        <option>1st Shift</option>
                        <option>2nd Shift</option>
                        <option>3rd Shift</option>
                        <option>General Shift</option>

                    </select>

                </div>

                <div>

                    <label class="block text-sm font-semibold mb-2">
                        Route Number
                    </label>

                    <div class="searchable-select disabled" data-name="routeNumber" id="routeNumberSelect">
                        <input
                        type="text"
                        class="form-control ss-input"
                        placeholder="Select Shift first"
                        autocomplete="off"
                        disabled>
                        <input type="hidden" name="routeNumber" class="ss-value" required>
                        <div class="ss-options"></div>
                    </div>

                </div>

            </div>

            <div class="grid md:grid-cols-2 gap-4">

                <div>

                    <label class="block text-sm font-semibold mb-2">
                        Bus Stop
                    </label>

                    <div class="searchable-select disabled" data-name="busStop" id="busStopSelect">
                        <input
                        type="text"
                        class="form-control ss-input"
                        placeholder="Select Route Number first"
                        autocomplete="off"
                        disabled>
                        <input type="hidden" name="busStop" class="ss-value">
                        <div class="ss-options"></div>
                    </div>

                </div>

                <div>

                    <label class="block text-sm font-semibold mb-2">
                        Password
                    </label>

                    <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Create Password"
                    required>

                </div>

            </div>

            <div>

                <label class="block text-sm font-semibold mb-2">
                    Address
                </label>

                <textarea
                name="address"
                rows="3"
                class="form-control"
                placeholder="Enter Address"></textarea>

            </div>

            <button
            type="submit"
            class="register-btn w-full text-white p-4 rounded-xl font-bold text-lg transition">

                Register Employee

            </button>

        </form>

        <div class="text-center mt-6">

            <a href="employeelogin.html"
            class="text-blue-600 font-semibold">

                Already have an account? Login

            </a>

        </div>

    </div>

</div>

const shiftSelectEl = document.getElementById("shiftSelect");

const routeWrapper = document.getElementById("routeNumberSelect");
const busStopWrapper = document.getElementById("busStopSelect");

const routeInput = routeWrapper.querySelector(".ss-input");
const routeHidden = routeWrapper.querySelector(".ss-value");
const routeOptionsBox = routeWrapper.querySelector(".ss-options");

const stopInput = busStopWrapper.querySelector(".ss-input");
const stopHidden = busStopWrapper.querySelector(".ss-value");
const stopOptionsBox = busStopWrapper.querySelector(".ss-options");


function renderRouteOptions(filterText){

    const selectedShift = shiftSelectEl.value;
    const routes = selectedShift ? Object.keys(SHIFT_ROUTES[selectedShift] || {}) : [];

    const filtered = routes.filter(function(route){
        return route.toLowerCase().includes((filterText || "").toLowerCase());
    });

    if(filtered.length === 0){
        routeOptionsBox.innerHTML = `<div class="ss-no-result">No route found for this shift</div>`;
        return;
    }

    routeOptionsBox.innerHTML = filtered.map(function(route){
        return `<div class="ss-option">${route}</div>`;
    }).join("");

}

function renderStopOptions(filterText){

    const selectedShift = shiftSelectEl.value;
    const selectedRoute = routeHidden.value;

    const shiftData = SHIFT_ROUTES[selectedShift] || {};
    const stops = shiftData[selectedRoute] || [];

    const filtered = stops.filter(function(stop){
        return stop.toLowerCase().includes((filterText || "").toLowerCase());
    });

    if(filtered.length === 0){
        stopOptionsBox.innerHTML = `<div class="ss-no-result">No bus stop found for this route</div>`;
        return;
    }

    stopOptionsBox.innerHTML = filtered.map(function(stop){
        return `<div class="ss-option">${stop}</div>`;
    }).join("");

}

function enableRoute(){
    routeInput.disabled = false;
    routeInput.placeholder = "Type to search Route Number";
    routeWrapper.classList.remove("disabled");
}

function resetRoute(){
    routeInput.value = "";
    routeHidden.value = "";
    routeInput.disabled = true;
    routeInput.placeholder = "Select Shift first";
    routeWrapper.classList.add("disabled");
    routeWrapper.classList.remove("open");
}

function enableBusStop(){
    stopInput.disabled = false;
    stopInput.placeholder = "Type to search Bus Stop";
    busStopWrapper.classList.remove("disabled");
}

function resetBusStop(){
    stopInput.value = "";
    stopHidden.value = "";
    stopInput.disabled = true;
    stopInput.placeholder = "Select Route Number first";
    busStopWrapper.classList.add("disabled");
    busStopWrapper.classList.remove("open");
}

// ---- Shift events (level 1) ----

shiftSelectEl.addEventListener("change", function(){

    resetRoute();
    resetBusStop();

    if(shiftSelectEl.value){
        enableRoute();
    }

});

// ---- Route Number events (level 2) ----

routeInput.addEventListener("focus", function(){

    if(routeInput.disabled){
        return;
    }

    routeWrapper.classList.add("open");
    renderRouteOptions(routeInput.value);

});

routeInput.addEventListener("input", function(){
    routeHidden.value = "";
    resetBusStop();
    renderRouteOptions(routeInput.value);
    routeWrapper.classList.add("open");
});

routeOptionsBox.addEventListener("click", function(e){

    if(!e.target.classList.contains("ss-option")){
        return;
    }

    const selected = e.target.textContent;
    routeInput.value = selected;
    routeHidden.value = selected;
    routeWrapper.classList.remove("open");

    resetBusStop();
    enableBusStop();

});

// ---- Bus Stop events (level 3) ----

stopInput.addEventListener("focus", function(){

    if(stopInput.disabled){
        return;
    }

    busStopWrapper.classList.add("open");
    renderStopOptions(stopInput.value);

});

stopInput.addEventListener("input", function(){
    stopHidden.value = "";
    renderStopOptions(stopInput.value);
    busStopWrapper.classList.add("open");
});

stopOptionsBox.addEventListener("click", function(e){

    if(!e.target.classList.contains("ss-option")){
        return;
    }

    const selected = e.target.textContent;
    stopInput.value = selected;
    stopHidden.value = selected;
    busStopWrapper.classList.remove("open");

});

// ---- Close dropdowns when clicking outside ----

document.addEventListener("click", function(e){

    if(!routeWrapper.contains(e.target)){
        routeWrapper.classList.remove("open");
    }

    if(!busStopWrapper.contains(e.target)){
        busStopWrapper.classList.remove("open");
    }

});

// ---- Validate Route Number was actually picked before submit ----

document.querySelector("form").addEventListener("submit", function(e){

    if(!routeHidden.value){
        e.preventDefault();
        alert("कृपया यादीतून Route Number निवडा.");
    }

});

</script>
