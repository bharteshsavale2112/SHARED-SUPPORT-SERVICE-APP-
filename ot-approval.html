<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>OT Temporary Bus Pass</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{

font-family:'Inter',sans-serif;

background:#f1f5f9;

}

.card{

max-width:950px;

margin:auto;

background:white;

border-radius:25px;

box-shadow:0 15px 40px rgba(0,0,0,.15);

overflow:hidden;

}

.left{

background:linear-gradient(135deg,#003399,#0059b3);

color:white;

}

.form-control{

width:100%;

padding:14px;

border:1px solid #d1d5db;

border-radius:12px;

outline:none;

transition:.3s;

}

.form-control:focus{

border-color:#2563eb;

box-shadow:0 0 0 4px rgba(37,99,235,.15);

}

.btn{

background:#2563eb;

color:white;

padding:15px;

border-radius:12px;

font-weight:bold;

transition:.3s;

}

.btn:hover{

background:#1d4ed8;

}

</style>

</head>

<body class="p-8">

<div class="card grid md:grid-cols-2">

<!-- LEFT PANEL -->

<div class="left p-10">

<img src="download (1).png"

class="w-28 mb-6">

<h1 class="text-4xl font-extrabold">

BAJAJ AUTO

</h1>

<p class="mt-3 text-blue-100">

OT Temporary Bus Pass

</p>

<div class="mt-10 space-y-3">

<p>✅ Shift Wise Route</p>

<p>✅ Auto Bus Stop</p>

<p>✅ Department Wise</p>

<p>✅ Temporary Pass (12 Hours)</p>

</div>

</div>

<!-- RIGHT PANEL -->

<div class="p-10">

<h2 class="text-3xl font-bold mb-8">

Generate OT Pass

</h2>

<form
id="otForm"

action="http://127.0.0.1:5000/ot-pass"

method="POST"

class="space-y-5">

<!-- Employee Code -->

<div>

<label class="font-semibold">

Employee Code

</label>

<input

type="text"

id="employeeCode"

name="employeeCode"

class="form-control"

required>

</div>

<!-- Employee Name -->

<div>

<label class="font-semibold">

Employee Name

</label>

<input

type="text"

id="employeeName"

name="employeeName"

class="form-control"

required>

</div>

<!-- Department -->

<div>

<label class="font-semibold">

Department

</label>

<select

id="department"

name="department"

class="form-control"

required>

<option value="">Select Department</option>

<option>Production</option>

<option>Assembly</option>

<option>Quality</option>

<option>Maintenance</option>

<option>HR</option>

<option>IT</option>

<option>Purchase</option>

<option>Store</option>

<option>Finance</option>

</select>

</div>

<!-- Shift -->

<div>

<label class="font-semibold">

Shift

</label>

<select

id="shift"

name="shift"

class="form-control"

onchange="loadRoutes()"

required>

<option value="">Select Shift</option>

<option>1st Shift</option>

<option>2nd Shift</option>

<option>3rd Shift</option>

<option>OT Shift</option>

</select>

</div>
<!-- Route Number -->

<div>

<label class="font-semibold">

Route Number

</label>

<select

id="routeNumber"

name="routeNumber"

class="form-control"

onchange="loadBusStop()"

required>

<option value="">Select Route</option>

</select>

</div>

<!-- Pickup Bus Stop -->

<div>

<label class="font-semibold">

Pickup Bus Stop

</label>

<input

type="text"

id="busStop"

name="busStop"

class="form-control"

placeholder="Automatically Selected"

readonly>

</div>

<!-- Drop Location -->

<div>

<label class="font-semibold">

Drop Location

</label>

<input

type="text"

id="dropLocation"

name="dropLocation"

class="form-control bg-gray-100"

value="Bajaj Chakan Plant 1"

readonly>

</div>

<!-- OT Date -->

<div>

<label class="font-semibold">

OT Date

</label>

<input

type="date"

id="otDate"

name="otDate"

class="form-control"

required>

</div>

<!-- OT Start Time -->

<div>

<label class="font-semibold">

OT Start Time

</label>

<input

type="time"

id="startTime"

name="startTime"

class="form-control"

required>

</div>

<!-- OT End Time -->

<div>

<label class="font-semibold">

OT End Time

</label>

<input

type="time"

id="endTime"

name="endTime"

class="form-control"

required>

<p class="text-sm text-red-500 mt-2">

OT Pass maximum 12 Hours only.

</p>

</div>

<!-- Mobile Number -->

<div>

<label class="font-semibold">

Mobile Number

</label>

<input

type="tel"

id="mobile"

name="mobile"

class="form-control"

placeholder="Enter Mobile Number"

required>

</div>

<!-- Reason -->

<div>

<label class="font-semibold">

Purpose of OT

</label>

<textarea

id="purpose"

name="purpose"

rows="3"

class="form-control"

placeholder="Enter OT Purpose"

required></textarea>

</div>

<!-- Submit Button -->

<button

type="submit"

class="btn w-full">

Generate Temporary Bus Pass

</button>

</form>

<div class="mt-6 text-center">

<a href="employee-dashboard.html"

class="text-blue-600 font-semibold">

← Back to Employee Dashboard

</a>

</div>

</div>

</div>
<script>

// ==============================
// SHIFT WISE ROUTES
// ==============================

const routes = {

"1st Shift":[
"Route 01",
"Route 02",
"Route 03",
"Route 04",
"Route 05",
"Route 06",
"Route 07",
"Route 08",
"Route 09",
"Route 10",
"Route 11"
],

"2nd Shift":[
"Route 12",
"Route 13",
"Route 14",
"Route 15",
"Route 16",
"Route 17",
"Route 18",
"Route 19",
"Route 20",
"Route 21"
],

"3rd Shift":[
"Route 22",
"Route 23",
"Route 24",
"Route 25",
"Route 26",
"Route 27",
"Route 28",
"Route 29"
],

"OT Shift":[
"Route 30",
"Route 31",
"Route 32",
"Route 33",
"Route 34",
"Route 35",
"Route 36",
"Route 37",
"Route 38"
]

};

// ==============================
// BUS STOP DATA
// ==============================

// ==============================
// COMPLETE BUS STOP MAPPING
// ==============================

const busStops = {

"Route 01":"Loni Gaon",
"Route 02":"Hotel Shravani",
"Route 03":"Kolhewadi",
"Route 04":"NDA",
"Route 05":"Wagheshwar Mandir",
"Route 06":"Santosh Nagar",
"Route 07":"Mengdewadi",
"Route 08":"Pabal",
"Route 09":"Vishrantwadi Chowk",
"Route 10":"Sangavi Bus Stop",
"Route 11":"Cosmos Bank",

// Update these with actual first pickup stops

"Route 12":"Pickup Stop Route 12",
"Route 13":"Pickup Stop Route 13",
"Route 14":"Pickup Stop Route 14",
"Route 15":"Pickup Stop Route 15",
"Route 16":"Pickup Stop Route 16",
"Route 17":"Pickup Stop Route 17",
"Route 18":"Pickup Stop Route 18",
"Route 19":"Pickup Stop Route 19",
"Route 20":"Pickup Stop Route 20",
"Route 21":"Pickup Stop Route 21",
"Route 22":"Pickup Stop Route 22",
"Route 23":"Pickup Stop Route 23",
"Route 24":"Pickup Stop Route 24",
"Route 25":"Pickup Stop Route 25",
"Route 26":"Pickup Stop Route 26",
"Route 27":"Pickup Stop Route 27",
"Route 28":"Pickup Stop Route 28",
"Route 29":"Pickup Stop Route 29",
"Route 30":"Pickup Stop Route 30",
"Route 31":"Pickup Stop Route 31",
"Route 32":"Pickup Stop Route 32",
"Route 33":"Pickup Stop Route 33",
"Route 34":"Pickup Stop Route 34",
"Route 35":"Pickup Stop Route 35",
"Route 36":"Pickup Stop Route 36",
"Route 37":"Pickup Stop Route 37",
"Route 38":"Pickup Stop Route 38"

};

// ==============================
// AUTO FILL BUS STOP
// ==============================

function loadBusStop(){

const route=document.getElementById("routeNumber").value;

const stop=busStops[route] || "";

document.getElementById("busStop").value=stop;

}

// ==============================
// AUTO LOAD AFTER LOGIN
// ==============================

window.addEventListener("load",function(){

const shift=localStorage.getItem("employee_shift");

if(shift){

document.getElementById("shift").value=shift;

loadRoutes();

setTimeout(function(){

const route=localStorage.getItem("employee_route");

if(route){

document.getElementById("routeNumber").value=route;

loadBusStop();

}

},100);

}

});

// ==============================
// LOAD ROUTES
// ==============================

function loadRoutes(){

const shift=document.getElementById("shift").value;

const route=document.getElementById("routeNumber");

route.innerHTML="<option value=''>Select Route</option>";

if(routes[shift]){

routes[shift].forEach(function(r){

route.innerHTML+=`<option value="${r}">${r}</option>`;

});

}

document.getElementById("busStop").value="";

}

// ==============================
// AUTO BUS STOP
// ==============================

function loadBusStop(){

const route=document.getElementById("routeNumber").value;

document.getElementById("busStop").value=
busStops[route] || "";

}

// ==============================
// DATE DEFAULT
// ==============================

window.onload=function(){

const today=new Date();

document.getElementById("otDate").value=
today.toISOString().split("T")[0];

}

// ==============================
// EMPLOYEE DETAILS AUTO FILL
// ==============================

window.addEventListener("DOMContentLoaded", function () {

document.getElementById("employeeCode").value =
localStorage.getItem("employee_id") || "";

document.getElementById("employeeName").value =
localStorage.getItem("employee_name") || "";

document.getElementById("department").value =
localStorage.getItem("employee_department") || "";

document.getElementById("shift").value =
localStorage.getItem("employee_shift") || "";

if(localStorage.getItem("employee_shift")){

loadRoutes();

}

setTimeout(function(){

document.getElementById("routeNumber").value =
localStorage.getItem("employee_route") || "";

loadBusStop();

},100);

});

// ==============================
// MAXIMUM 12 HOURS VALIDATION
// ==============================

document.getElementById("otForm").addEventListener("submit",function(e){

const start=document.getElementById("startTime").value;

const end=document.getElementById("endTime").value;

if(start=="" || end==""){

alert("Please Select OT Time");

e.preventDefault();

return;

}

const startTime=new Date("2026-01-01T"+start);

let endTime=new Date("2026-01-01T"+end);

if(endTime<startTime){

endTime.setDate(endTime.getDate()+1);

}

const diff=(endTime-startTime)/(1000*60*60);

if(diff>12){

alert("Temporary Bus Pass Maximum 12 Hours Only");

e.preventDefault();

return;

}

});

// ==============================
// SIMPLE VALIDATION
// ==============================

document.getElementById("otForm").addEventListener("submit",function(e){

const code=document.getElementById("employeeCode").value.trim();

const name=document.getElementById("employeeName").value.trim();

const dept=document.getElementById("department").value;

const shift=document.getElementById("shift").value;

const route=document.getElementById("routeNumber").value;

const stop=document.getElementById("busStop").value;

if(code==""){

alert("Enter Employee Code");

e.preventDefault();

return;

}

if(name==""){

alert("Enter Employee Name");

e.preventDefault();

return;

}

if(dept==""){

alert("Select Department");

e.preventDefault();

return;

}

if(shift==""){

alert("Select Shift");

e.preventDefault();

return;

}

if(route==""){

alert("Select Route");

e.preventDefault();

return;

}

if(stop==""){

alert("Bus Stop Not Found");

e.preventDefault();

return;

}

});

// ==============================
// SUCCESS MESSAGE
// ==============================

function passGenerated(){

alert("Temporary Bus Pass Generated Successfully");

}

// ==============================
// END SCRIPT
// ==============================

</script>

</body>

</html>
