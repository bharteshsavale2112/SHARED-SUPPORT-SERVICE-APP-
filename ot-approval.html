//=========================
// ROUTE SELECT
//=========================

function loadRouteDetails(){

let id=document.getElementById("route").value;

if(id==""){

document.getElementById("routeNumber").value="";
document.getElementById("routeName").value="";
document.getElementById("busStops").value="";

return;

}

let r=routes[id];

document.getElementById("routeNumber").value=r.number;

document.getElementById("routeName").value=r.name;

document.getElementById("busStops").value=r.stops;

}

//=========================
// TOTAL CALCULATION
//=========================

function updateTotals(){

let h2=parseInt(document.getElementById("twoHours").value)||0;

let h3=parseInt(document.getElementById("threeHours").value)||0;

document.getElementById("total2").innerHTML=h2;

document.getElementById("total3").innerHTML=h3;

}

document.getElementById("twoHours")
.addEventListener("input",updateTotals);

document.getElementById("threeHours")
.addEventListener("input",updateTotals);

updateTotals();

//=========================
// FORM SUBMIT
//=========================

async function submitOT(){

const department=document.getElementById("department").value;

const route=document.getElementById("routeNumber").value;

const routeName=document.getElementById("routeName").value;

const stops=document.getElementById("busStops").value;

const twoHours=document.getElementById("twoHours").value;

const threeHours=document.getElementById("threeHours").value;

const submittedBy=document.getElementById("submittedBy").value;

const shift=document.getElementById("shiftSelect").value;


//================ Validation ==================

if(submittedBy==""){

alert("Please Enter Submitted By");

return;

}

if(department==""){

alert("Please Select Department");

return;

}

if(route==""){

alert("Please Select Route");

return;

}


//================ FormData ====================

const formData=new FormData();

formData.append("submittedBy",submittedBy);

formData.append("department",department);

formData.append("shift",shift);

formData.append("routeNumber",route);

formData.append("routeName",routeName);

formData.append("busStops",stops);

formData.append("twoHours",twoHours);

formData.append("threeHours",threeHours);


//================ Send Backend =================

try{

const response=await fetch("/submit-ot",{

method:"POST",

body:formData

});

const result=await response.json();

if(result.status=="success"){

showToast("OT Request Submitted Successfully");

document.getElementById("otForm").reset();

document.getElementById("routeNumber").value="";

document.getElementById("routeName").value="";

document.getElementById("busStops").value="";

document.getElementById("total2").innerHTML="0";

document.getElementById("total3").innerHTML="0";

}

else{

alert(result.message);

}

}

catch(err){

console.log(err);

alert("Server Connection Failed");

}

}


//=========================
// SUBMIT BUTTON
//=========================

document
.getElementById("submitBtn")
.addEventListener("click",submitOT);


//=========================
// TOAST MESSAGE
//=========================

function showToast(message){

const toast=document.createElement("div");

toast.innerHTML=message;

toast.style.position="fixed";

toast.style.right="20px";

toast.style.bottom="20px";

toast.style.background="#16a34a";

toast.style.color="white";

toast.style.padding="15px 25px";

toast.style.borderRadius="12px";

toast.style.fontWeight="600";

toast.style.boxShadow="0 10px 30px rgba(0,0,0,.2)";

toast.style.zIndex="9999";

document.body.appendChild(toast);

setTimeout(()=>{

toast.remove();

},3000);

}//=========================
// PAGE LOAD
//=========================

window.onload = function(){

updateDateTime();

updateTotals();

};

//=========================
// AUTO REFRESH TIME
//=========================

setInterval(function(){

updateDateTime();

},1000);

</script>
