<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bajaj Auto | Permanent Bus Pass</title>

<style>

body{
margin:0;
padding:40px;
background:#edf2f7;
font-family:Inter, sans-serif;
}

.pass{
max-width:1000px;
margin:auto;
background:white;
border-radius:25px;
overflow:hidden;
border:4px solid #0047ab;
box-shadow:0 20px 45px rgba(0,0,0,0.18);
}

.header{
background:#0047ab;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:25px;
}

.title{
text-align:center;
padding:20px;
font-size:32px;
font-weight:bold;
background:#0047ab;
color:white;
margin:20px;
border-radius:10px;
}

.content{
display:grid;
grid-template-columns:1fr 1fr;
padding:30px;
gap:20px;
}

.row{
display:grid;
grid-template-columns:200px 20px auto;
margin-bottom:12px;
font-size:18px;
}

.label{
font-weight:700;
color:#003b82;
}

.value{
font-weight:600;
}

.right{
text-align:center;
}

.signature{
width:250px;
margin-top:20px;
}

.status{
background:#0a8f2f;
color:white;
padding:10px 40px;
border-radius:30px;
display:inline-block;
margin-top:30px;
font-weight:bold;
}

.buttons{
display:flex;
gap:15px;
margin:20px;
}

button{
flex:1;
padding:15px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
}

.print{background:#0056b3;color:white;}
.pdf{background:#16a34a;color:white;}
.back{background:#334155;color:white;width:calc(100% - 40px);margin:0 20px 20px;}

.footer{
background:#0047ab;
color:white;
text-align:center;
padding:15px;
font-size:18px;
font-weight:bold;
}

@media print{
button{display:none;}
body{background:white;padding:0;}
.pass{border:none;box-shadow:none;}
}

/* ================= MOBILE RESPONSIVE FIX ================= */

@media (max-width: 768px) {

body{
padding:10px;
}

.pass{
border-radius:15px;
}

.header{
flex-direction:column;
text-align:center;
gap:10px;
}

.title{
font-size:20px;
padding:15px;
margin:10px;
}

.content{
grid-template-columns:1fr;
padding:15px;
}

.row{
grid-template-columns:120px 10px auto;
font-size:14px;
}

.buttons{
flex-direction:column;
}

button{
font-size:16px;
padding:12px;
}

.signature{
width:180px;
}

.status{
font-size:18px;
padding:8px 25px;
}
}
</style>

</head>

<body>

<div class="pass">

<div class="header">
<h1>Bajaj Auto</h1>
<img src="Bajaj.png" height="60">
</div>

<div class="title">Permanent Bus Pass</div>

<div class="content">

<div class="left">

<div class="row"><div class="label">Name</div><div>:</div><div id="employeeName">Loading...</div></div>
<div class="row"><div class="label">ID</div><div>:</div><div id="employeeCode">Loading...</div></div>
<div class="row"><div class="label">Dept</div><div>:</div><div id="department">Loading...</div></div>
<div class="row"><div class="label">Shift</div><div>:</div><div id="shift">Loading...</div></div>
<div class="row"><div class="label">Route</div><div>:</div><div id="routeNumber">Loading...</div></div>
<div class="row"><div class="label">Stop</div><div>:</div><div id="busStop">Loading...</div></div>
<div class="row"><div class="label">Mobile</div><div>:</div><div id="mobile">Loading...</div></div>
<div class="row"><div class="label">Issue Date</div><div>:</div><div id="issueDate">Loading...</div></div>

</div>

<div class="row">
    <div class="label">Status</div>
    <div>:</div>
    <div id="status">Loading...</div>
</div>

<div class="right">
<img class="signature" src="sign.png">

</div>

</div>

<div class="buttons">
<button class="print" onclick="window.print()">Print</button>
<button class="pdf" onclick="window.print()">Download PDF</button>
</div>

<button class="back" onclick="goBack()">Back To Dashboard</button>

<div class="footer">BAJAJ AUTO TRANSPORT SYSTEM</div>

</div>

<script>

const employeeCode = localStorage.getItem("employeeCode");

// 👇 हे add कर
console.log("Employee Code from localStorage:", employeeCode);

async function loadPass(){

    try{

        const res = await fetch(
            "http://127.0.0.1:5000/my-pass/" + employeeCode
        );

        const data = await res.json();

        console.log(data);

        if(data.status !== "success"){

            alert(data.message);
            return;

        }

        document.getElementById("employeeName").innerText =
        data.employeeName || "";

        document.getElementById("employeeCode").innerText =
        data.employeeCode || "";

        document.getElementById("department").innerText =
        data.department || "";

        document.getElementById("shift").innerText =
        data.shift || "";

        document.getElementById("routeNumber").innerText =
        data.routeNumber || "";

        document.getElementById("busStop").innerText =
        data.busStop || "";

        document.getElementById("mobile").innerText =
        data.mobile || "";

        document.getElementById("issueDate").innerText =
        data.issueDate || "";

        document.getElementById("status").innerText =
        data.passStatus || "";

    }

    catch(err){

        console.log(err);
        alert("Error loading pass");

    }

}

function goBack(){
    window.location.href="employee-dashboard.html";
}

window.onload = loadPass;

</script>

</body>
</html>
