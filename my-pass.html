<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bajaj Auto |  Bus Pass</title>

<style>

body{
margin:0;
padding:40px;
background:#87ceeb;
font-family:Inter, sans-serif;
}

.pass{
max-width:1000px;
margin:auto;
background:white;
border-radius:25px;
overflow:hidden;
border:4px solid #0047ab;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

.header{
background:#0047ab;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 30px;
}

.header h1{
margin:0;
font-size:28px;
}

.header img{
height:90px;
background:white;
padding:8px 14px;
border-radius:12px;
}

.title{
text-align:center;
padding:20px;
font-size:32px;
font-weight:bold;
background:#0047ab;
color:white;
margin:20px;
border-radius:10px;
}

.content{
display:grid;
grid-template-columns:1fr 1fr;
padding:30px;
gap:20px;
align-items:start;
}

.row{
display:grid;
grid-template-columns:150px 20px auto;
margin-bottom:14px;
font-size:18px;
}

.label{
font-weight:700;
color:#003b82;
}

.value{
font-weight:600;
}

.right{
text-align:center;
}

.signature{
width:220px;
margin-top:10px;
}

.status-wrap{
text-align:center;
margin-bottom:10px;
}

.status{
background:#0a8f2f;
color:white;
padding:10px 40px;
border-radius:30px;
display:inline-block;
margin-top:10px;
font-weight:bold;
font-size:18px;
}

.buttons{
display:flex;
gap:15px;
margin:20px;
}

button{
flex:1;
padding:16px;
font-size:17px;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:.9;
}

.print{background:#0056b3;color:white;}
.pdf{background:#16a34a;color:white;}
.back{background:#334155;color:white;width:calc(100% - 40px);margin:0 20px 20px;padding:14px;font-size:16px;}

.footer{
background:#0047ab;
color:white;
text-align:center;
padding:15px;
font-size:16px;
font-weight:bold;
letter-spacing:.5px;
}

@media print{
button{display:none;}
body{background:white;padding:0;}
.pass{border:none;box-shadow:none;}
}

/* ================= MOBILE RESPONSIVE FIX ================= */

@media (max-width: 768px) {

body{
padding:10px;
}

.pass{
border-radius:15px;
}

.header{
flex-direction:column;
text-align:center;
gap:12px;
padding:20px;
}

.header h1{
font-size:22px;
}

.header img{
height:70px;
}

.title{
font-size:20px;
padding:15px;
margin:10px;
}

.content{
grid-template-columns:1fr;
padding:15px;
}

.row{
grid-template-columns:120px 10px auto;
font-size:14px;
}

.buttons{
flex-direction:column;
}

button{
font-size:16px;
padding:14px;
}

.signature{
width:160px;
}

.status{
font-size:16px;
padding:8px 25px;
}
}
</style>


<!-- ============ AUTO LOGOUT / SESSION GUARD (added) ============ -->
<script>
(function(){
    async function verifySession(){
        try{
            const res = await fetch("/check-session", { cache: "no-store" });
            if(!res.ok){
                window.location.href = "employeelogin.html";
            }
        } catch(e){
            window.location.href = "employeelogin.html";
        }
    }
    verifySession();
    window.addEventListener("pageshow", function(event){
        if(event.persisted){ verifySession(); }
    });
})();
</script>
<!-- ============ END SESSION GUARD ============ -->

<link rel="stylesheet" href="mobile.css">
</head>

<body>

<div class="pass">

<div class="header">
<h1>Bajaj Auto</h1>
<img src="Bajaj.png" alt="Bajaj Logo">
</div>

<div class="title"> Bus Pass</div>

<div class="content">

<div class="left">

<div class="row"><div class="label">Name</div><div>:</div><div id="employeeName">Loading...</div></div>
<div class="row"><div class="label">ID</div><div>:</div><div id="employeeCode">Loading...</div></div>
<div class="row"><div class="label">Dept</div><div>:</div><div id="department">Loading...</div></div>
<div class="row"><div class="label">Shift</div><div>:</div><div id="shift">Loading...</div></div>
<div class="row"><div class="label">Route</div><div>:</div><div id="routeNumber">Loading...</div></div>
<div class="row"><div class="label">Stop</div><div>:</div><div id="busStop">Loading...</div></div>
<div class="row"><div class="label">Mobile</div><div>:</div><div id="mobile">Loading...</div></div>
<div class="row"><div class="label">Issue Date</div><div>:</div><div id="issueDate">Loading...</div></div>

</div>

<div class="right">
<img class="signature" src="sign.png">
<div class="status-wrap">
<div id="status" class="status">Loading...</div>
</div>
</div>

</div>

<div class="buttons">
<button class="print" onclick="window.print()">🖨️ Print</button>
<button class="pdf" onclick="window.print()">⬇️ Download PDF</button>
</div>

<button class="back" onclick="goBack()">← Back To Dashboard</button>

<div class="footer">BAJAJ AUTO TRANSPORT SYSTEM</div>

</div>

<script>

const employeeCode = localStorage.getItem("employeeCode");

//
console.log("Employee Code from localStorage:", employeeCode);

async function loadPass(){

    try{

        const res = await fetch(
            "/my-pass/" + employeeCode
        );

        const data = await res.json();

        console.log(data);

        if(data.status !== "success"){

            // If the session isn't valid for this page (expired, or
            // logged in as a different role in this same browser), send
            // the person to login instead of leaving everything stuck
            // on "Loading...".
            if(res.status === 401 || res.status === 403){
                alert("Session expired or you're logged in as a different user in this browser. Please login again.");
                window.location.href = "employeelogin.html";
                return;
            }

            alert(data.message);
            return;

        }

        document.getElementById("employeeName").innerText =
        data.employeeName || "";

        document.getElementById("employeeCode").innerText =
        data.employeeCode || "";

        document.getElementById("department").innerText =
        data.department || "";

        document.getElementById("shift").innerText =
        data.shift || "";

        document.getElementById("routeNumber").innerText =
        data.routeNumber || "";

        document.getElementById("busStop").innerText =
        data.busStop || "";

        document.getElementById("mobile").innerText =
        data.mobile || "";

        document.getElementById("issueDate").innerText =
        data.issueDate || "";

        document.getElementById("status").innerText =
        data.passStatus || "";

    }

    catch(err){

        console.log(err);
        alert("Error loading pass");

    }

}

function goBack(){
    window.location.href="employee-dashboard.html";
}

window.onload = loadPass;

</script>
