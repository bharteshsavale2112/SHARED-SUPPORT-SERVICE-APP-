<!DOCTYPE html>
<html>
<head>
<title>Employee Route Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 90vh; }
</style>
</head>

<body>

<h2>🚍 Your Bus Route + Live Tracking</h2>
<div id="map"></div>

<script>

let route = "ROUTE1"; // later replace from login

// map
let map = L.map('map').setView([13.0827, 80.2707], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);


// 🚍 BUS ICON
let busIcon = L.icon({
    iconUrl: "Bajaj",
    iconSize: [40, 40]
});

let busMarker = L.marker([13.0827, 80.2707], {icon: busIcon}).addTo(map);


// 📍 ROUTE LINE (demo path)
let routeLine = L.polyline([
    [13.0827, 80.2707],
    [13.0927, 80.2807],
    [13.1027, 80.3007]
], {color: 'blue'}).addTo(map);


// 🔄 LIVE BUS UPDATE
async function updateBus() {

    let res = await fetch(`/live-location/${route}`);
    let data = await res.json();

    if (data.success !== false && data.lat) {

        let lat = data.lat;
        let lng = data.lng;

        // move bus
        busMarker.setLatLng([lat, lng]);

        // follow bus
        map.setView([lat, lng], 14);
    }
}

setInterval(updateBus, 3000);
updateBus();

</script>

</body>
</html>
