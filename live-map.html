<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Route Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body{ background:#0f172a; }

.topbar{
  position:sticky; top:0; z-index:1000;
  background:#0056b3;
  color:#fff;
  padding:14px 16px;
  display:flex; align-items:center; gap:12px;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
}
.topbar img{ height:34px; width:auto; background:#fff; padding:4px 8px; border-radius:8px; }
.topbar h2{ font-size:16px; font-weight:800; line-height:1.2; }
.topbar p{ font-size:11px; opacity:.85; }

#map{ height:calc(100vh - 66px); width:100%; }

#globalBackBtn{
  margin-left:auto;
  background:#0f172a; color:#fff; border:none;
  padding:8px 14px; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer;
}
#globalBackBtn:hover{ background:#000; }
</style>
<link rel="stylesheet" href="mobile.css">
</head>

<body>

<div class="topbar">
  <img src="logo.png" alt="Bajaj Auto">
  <div>
    <h2>Live Bus Tracking</h2>
    <p>Your route in real time</p>
  </div>
  <button id="globalBackBtn" onclick="(function(){ if(window.history.length>1){ window.history.back(); } else { window.location.href='index.html'; } })()">← Back</button>
</div>

<div id="map"></div>

<script>
let route = "ROUTE1"; // later replace from login

let map = L.map('map').setView([13.0827, 80.2707], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Bus marker icon (fixed path)
let busIcon = L.icon({
    iconUrl: "Bajaj.png",
    iconSize: [40, 40]
});

let busMarker = L.marker([13.0827, 80.2707], {icon: busIcon}).addTo(map);

let routeLine = L.polyline([
    [13.0827, 80.2707],
    [13.0927, 80.2807],
    [13.1027, 80.3007]
], {color: 'blue'}).addTo(map);

async function updateBus() {
    try{
        let res = await fetch(`/live-location/${route}`);
        let data = await res.json();
        if (data.success !== false && data.lat) {
            busMarker.setLatLng([data.lat, data.lng]);
            map.setView([data.lat, data.lng], 14);
        }
    }catch(e){ /* server offline */ }
}

setInterval(updateBus, 3000);
updateBus();

// Keep the Leaflet map sized correctly after orientation / resize
window.addEventListener("resize", ()=> setTimeout(()=>map.invalidateSize(), 200));
</script>

</body>
</html>
