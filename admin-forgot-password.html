<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Forgot Password</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:
linear-gradient(rgba(15,23,42,.88),rgba(15,23,42,.88)),
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
}

.card{
backdrop-filter:blur(10px);
}

</style>

</head>

<body class="min-h-screen flex items-center justify-center p-4 relative">

<!-- BACK BUTTON -->

<div class="absolute top-5 right-5">

<a href="adminlogin.html"
class="bg-white/10 border border-white/20 text-white px-4 py-2 rounded-xl font-semibold hover:bg-white/20">

← Back

</a>

</div>

<!-- CARD -->

<div class="card bg-white/10 border border-white/20 w-full max-w-md rounded-3xl p-8 shadow-2xl">

<div class="text-center mb-8">

<div class="h-20 w-20 rounded-3xl bg-red-600 mx-auto flex items-center justify-center text-white text-4xl">
🔐
</div>

<h1 class="text-3xl font-extrabold text-white mt-5">
Admin Password Reset
</h1>

<p class="text-slate-300 text-sm mt-2">
Enter your registered admin email
</p>

</div>

<form
action="/admin-forgot-password"
method="POST">

<div>

<label class="text-white text-sm font-semibold block mb-2">
Admin Email
</label>

<input
type="email"
name="email"
required
placeholder="Enter Admin Email"
class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 text-white placeholder-slate-300 outline-none focus:border-red-400">

</div>

<button
type="submit"
class="w-full mt-5 bg-red-600 hover:bg-red-700 text-white p-4 rounded-2xl font-bold">

Send Reset Link

</button>

</form>

<div class="mt-6 p-4 rounded-2xl bg-white/10 text-slate-300 text-sm text-center">

Password reset link will be sent to your registered email.

</div>

<div class="border-t border-white/10 mt-6 pt-4 text-center">

<p class="text-slate-400 text-xs">
© 2026 Bajaj Auto Transport System
</p>

</div>

</div>

</body>
</html>
